<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Engine — Адмінка</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Quest Engine</h1>

      <div class="admin-user-row">
        <p id="userInfo">Перевіряємо авторизацію...</p>
        <div class="admin-user-actions">
          <a href="/profile.html">
            <button type="button">Редагувати профіль</button>
          </a>
          <button id="logoutBtn" type="button">Вийти</button>
        </div>
      </div>

      <div class="admin-dashboard-block">
        <h2>Запуски ігор</h2>
        <p>Планування запусків, перегляд активних запусків і архіву.</p>
        <div class="admin-dashboard-actions">
          <button id="showCreateRunBtn" class="large-action-btn" type="button">Запланувати запуск</button>
          <a href="/all-active-runs.html">
            <button class="large-action-btn" type="button">Усі актуальні запуски</button>
          </a>
          <a href="/all-runs-archive.html">
            <button class="large-action-btn" type="button">Архів усіх запусків</button>
          </a>
        </div>
      </div>

      <div id="createRunBlock" class="info-block create-run-form hidden">
        <h2>Запланувати запуск</h2>

        <label class="compact-form-row">
          <span>Оберіть гру:</span>
          <select id="runGameSelect">
            <option value="">Завантаження...</option>
          </select>
        </label>

        <label class="compact-form-row">
          <span>Вкажіть назву запуску:</span>
          <input id="runTitle" type="text" placeholder="Наприклад: Ajax Systems Summer Quest" />
        </label>

        <div class="compact-run-bottom-row">
          <label>
            <span>Дата старту:</span>
            <input id="runDate" type="date" />
          </label>
          <label>
            <span>Час старту:</span>
            <input id="runTime" type="time" />
          </label>
          <button id="createRunBtn" type="button">Створити запуск</button>
          <span id="createRunMessage"></span>
        </div>
      </div>

      <div class="admin-dashboard-block">
        <h2>Ігри</h2>
        <p>Створення, редагування та перегляд каталогу ігор.</p>
        <div class="admin-dashboard-actions">
          <button id="showCreateGameBtn" class="large-action-btn" type="button">Створити гру</button>
          <a href="/games-catalog.html">
            <button class="large-action-btn" type="button">Каталог ігор</button>
          </a>
        </div>
      </div>

      <div id="createGameBlock" class="info-block hidden">
        <h2>Створити гру</h2>

        <input id="gameTitle" type="text" placeholder="Назва гри" />
        <input id="gameDescription" type="text" placeholder="Короткий опис" />

        <select id="gameLanguage">
          <option value="uk">Українська</option>
          <option value="en">English</option>
        </select>

        <select id="gameType">
          <option value="LINEAR">LINEAR — лінійний квест</option>
          <option value="STORM">STORM — штурм</option>
          <option value="CUSTOM">CUSTOM — кастомна логіка</option>
        </select>

        <select id="winnerType">
          <option value="TIME">TIME — переможець за часом</option>
          <option value="POINTS">POINTS — переможець за балами</option>
        </select>

        <button id="createGameBtn" type="button">Створити гру</button>
        <p id="message"></p>
      </div>

      <div id="usersAndRolesBlock" class="admin-dashboard-block hidden">
        <h2>Користувачі і ролі</h2>
        <p>Керування користувачами, ролями та доступами.</p>
        <div class="admin-dashboard-actions">
          <a href="/users.html">
            <button class="large-action-btn" type="button">Користувачі</button>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="time-utils.js"></script>
  <script>
    let currentUser = null;

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    async function checkAuth() {
      const response = await fetch("/api/auth/me");
      const result = await response.json();

      if (!response.ok || !result.user) {
        window.location.href = "/login.html";
        return null;
      }

      currentUser = result.user;

      document.getElementById("userInfo").textContent =
        `Ви увійшли як: ${result.user.name} (${result.user.role})`;

      if (result.user.role === "ADMIN") {
        document.getElementById("usersAndRolesBlock").classList.remove("hidden");
      }

      return result.user;
    }


    async function loadReadyGamesForRun() {
      const select = document.getElementById("runGameSelect");
      if (!select) return;

      const response = await fetch("/api/games/ready");
      const result = await response.json();

      if (!response.ok) {
        select.innerHTML = `<option value="">${escapeHtml(result.error || "Помилка завантаження")}</option>`;
        return;
      }

      const games = result.games || [];
      if (!games.length) {
        select.innerHTML = '<option value="">Немає ігор зі статусом READY</option>';
        return;
      }

      select.innerHTML = `
        <option value="">Оберіть гру</option>
        ${games.map(game => `
          <option value="${game.id}">${escapeHtml(game.title || `Гра #${game.id}`)}</option>
        `).join("")}
      `;
    }

    document.getElementById("showCreateGameBtn").addEventListener("click", () => {
      document.getElementById("createGameBlock").classList.toggle("hidden");
      document.getElementById("gameTitle").focus();
    });

    document.getElementById("showCreateRunBtn").addEventListener("click", async () => {
      const block = document.getElementById("createRunBlock");
      block.classList.toggle("hidden");
      if (!block.classList.contains("hidden")) {
        await loadReadyGamesForRun();
        document.getElementById("runGameSelect").focus();
      }
    });

    document.getElementById("createRunBtn").addEventListener("click", async () => {
      const gameId = document.getElementById("runGameSelect").value;
      const title = document.getElementById("runTitle").value.trim();
      const date = document.getElementById("runDate").value;
      const time = document.getElementById("runTime").value;
      const message = document.getElementById("createRunMessage");

      message.className = "";
      message.textContent = "";

      if (!gameId) { alert("Оберіть гру"); return; }
      if (!title) { alert("Вкажіть назву запуску"); return; }
      if (!date) { alert("Вкажіть дату старту"); return; }
      if (!time) { alert("Вкажіть час старту"); return; }

      const started_at = QETime.toUtcSqlFromLocalDateTime(date, time);
      const response = await fetch("/api/runs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ game_id: gameId, title, started_at })
      });

      const result = await response.json();
      if (!response.ok) {
        message.className = "";
        message.textContent = result.error || "Помилка створення запуску";
        return;
      }

      window.location.href = `/run.html?id=${result.runId}`;
    });

    document.getElementById("createGameBtn").addEventListener("click", async () => {
      const payload = {
        title: document.getElementById("gameTitle").value,
        description: document.getElementById("gameDescription").value,
        language: document.getElementById("gameLanguage").value,
        game_type: document.getElementById("gameType").value,
        winner_type: document.getElementById("winnerType").value
      };

      const response = await fetch("/api/games", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (!response.ok) {
        document.getElementById("message").className = "";
        document.getElementById("message").textContent =
          result.error || "Помилка створення гри";
        return;
      }

      window.location.href = `/game.html?id=${result.game.id}`;
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login.html";
    });

    checkAuth();
  </script>
</body>
</html>
