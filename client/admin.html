<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Engine — Адмінка</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Quest Engine</h1>

      <div class="admin-user-row">
        <p id="userInfo">Перевіряємо авторизацію...</p>
        <div class="admin-user-actions">
          <a href="/profile.html">
            <button type="button">Редагувати профіль</button>
          </a>
          <button id="logoutBtn" type="button">Вийти</button>
        </div>
      </div>

      <div class="admin-dashboard-block">
        <h2>Запуски ігор</h2>
        <p>Планування запусків, перегляд активних запусків і архіву.</p>
        <div class="admin-dashboard-actions">
          <a href="/schedule-run.html">
            <button class="large-action-btn" type="button">Запланувати запуск</button>
          </a>
          <a href="/all-active-runs.html">
            <button class="large-action-btn" type="button">Усі актуальні запуски</button>
          </a>
          <a href="/all-runs-archive.html">
            <button class="large-action-btn" type="button">Архів усіх запусків</button>
          </a>
        </div>
      </div>

      <div class="admin-dashboard-block">
        <h2>Ігри</h2>
        <p>Створення, редагування та перегляд каталогу ігор.</p>
        <div class="admin-dashboard-actions">
          <button id="showCreateGameBtn" class="large-action-btn" type="button">Створити гру</button>
          <a href="/games-catalog.html">
            <button class="large-action-btn" type="button">Каталог ігор</button>
          </a>
        </div>
      </div>

      <div id="createGameBlock" class="info-block hidden">
        <h2>Створити гру</h2>

        <input id="gameTitle" type="text" placeholder="Назва гри" />
        <input id="gameDescription" type="text" placeholder="Короткий опис" />

        <select id="gameLanguage">
          <option value="uk">Українська</option>
          <option value="en">English</option>
        </select>

        <select id="gameType">
          <option value="LINEAR">LINEAR — лінійний квест</option>
          <option value="STORM">STORM — штурм</option>
          <option value="CUSTOM">CUSTOM — кастомна логіка</option>
        </select>

        <select id="winnerType">
          <option value="TIME">TIME — переможець за часом</option>
          <option value="POINTS">POINTS — переможець за балами</option>
        </select>

        <button id="createGameBtn" type="button">Створити гру</button>
        <p id="message"></p>
      </div>

      <div id="usersAndRolesBlock" class="admin-dashboard-block hidden">
        <h2>Користувачі і ролі</h2>
        <p>Керування користувачами, ролями та доступами.</p>
        <div class="admin-dashboard-actions">
          <a href="/users.html">
            <button class="large-action-btn" type="button">Користувачі</button>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script>
    let currentUser = null;

    async function checkAuth() {
      const response = await fetch("/api/auth/me");
      const result = await response.json();

      if (!response.ok || !result.user) {
        window.location.href = "/login.html";
        return null;
      }

      currentUser = result.user;

      document.getElementById("userInfo").textContent =
        `Ви увійшли як: ${result.user.name} (${result.user.role})`;

      if (result.user.role === "ADMIN") {
        document.getElementById("usersAndRolesBlock").classList.remove("hidden");
      }

      return result.user;
    }

    document.getElementById("showCreateGameBtn").addEventListener("click", () => {
      document.getElementById("createGameBlock").classList.toggle("hidden");
      document.getElementById("gameTitle").focus();
    });

    document.getElementById("createGameBtn").addEventListener("click", async () => {
      const payload = {
        title: document.getElementById("gameTitle").value,
        description: document.getElementById("gameDescription").value,
        language: document.getElementById("gameLanguage").value,
        game_type: document.getElementById("gameType").value,
        winner_type: document.getElementById("winnerType").value
      };

      const response = await fetch("/api/games", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (!response.ok) {
        document.getElementById("message").className = "";
        document.getElementById("message").textContent =
          result.error || "Помилка створення гри";
        return;
      }

      window.location.href = `/game.html?id=${result.game.id}`;
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await fetch("/api/auth/logout", { method: "POST" });
      window.location.href = "/login.html";
    });

    checkAuth();
  </script>
</body>
</html>
