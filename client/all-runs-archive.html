<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Архів усіх запусків</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="card">

    <a href="/admin.html">← До адмінки</a>

    <h1>Архів усіх запусків</h1>

    <div class="info-block">
      <table class="codes-table">
        <thead>
          <tr>
            <th>Назва запуску</th>
            <th>Назва гри</th>
            <th>Старт</th>
            <th>Завершення</th>
            <th>Статус</th>
            <th>Статистика</th>
            <th>Дії</th>
          </tr>
        </thead>

        <tbody id="allArchiveRunsTableBody">
          <tr>
            <td colspan="7">Завантаження...</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script src="time-utils.js"></script>
<script>
function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

async function loadAllArchiveRuns() {
  const response = await fetch("/api/runs/archive");
  const result = await response.json();

  const tableBody = document.getElementById("allArchiveRunsTableBody");

  if (!response.ok) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="7">
          ${escapeHtml(result.error || "Помилка завантаження архіву")}
        </td>
      </tr>
    `;
    return;
  }

  if (!result.runs.length) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="7">Архівних запусків поки немає</td>
      </tr>
    `;
    return;
  }

  tableBody.innerHTML = result.runs.map(run => `
    <tr class="clickable-row">
      <td onclick="openRun(${run.id})">${escapeHtml(run.title)}</td>
      <td>${escapeHtml(run.game_title || "-")}</td>
      <td>${escapeHtml(QETime.formatLocalDateTimeForList(run.started_at))}</td>
      <td>${escapeHtml(QETime.formatLocalDateTimeForList(run.finished_at))}</td>
      <td>${escapeHtml(run.status)}</td>
      <td>
        <button onclick="openStatistics(${run.id})">
          Статистика
        </button>
      </td>
      <td>
        <button onclick="deleteRun(${run.id})">
          Видалити
        </button>
      </td>
    </tr>
  `).join("");
}

function openRun(runId) {
  window.location.href = `/run.html?id=${runId}`;
}

function openStatistics(runId) {
  window.open(`/statistics.html?run=${runId}`, "_blank", "noopener");
}

async function deleteRun(runId) {
  const confirmed = confirm("Видалити цей архівний запуск?");
  if (!confirmed) return;

  const response = await fetch(`/api/runs/${runId}`, { method: "DELETE" });
  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Помилка видалення");
    return;
  }

  loadAllArchiveRuns();
}

loadAllArchiveRuns();
</script>

</body>
</html>
