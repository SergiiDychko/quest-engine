<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Відновлення пароля</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app auth-page">
    <section class="card auth-card">
      <a href="/login.html">← Назад до входу</a>
      <h1>Відновлення пароля</h1>
      <p>Вкажіть логін або email відновлення. Якщо профіль знайдено, буде створено посилання для скидання пароля.</p>

      <form id="forgotPasswordForm">
        <input id="identifier" type="text" placeholder="Логін або email" autocomplete="username" required>
        <button type="submit">Надіслати інструкцію</button>
      </form>

      <div id="message"></div>
      <div id="devLinkBox" class="info-block hidden"></div>
    </section>
  </main>

  <script>
    async function readJson(response) {
      try { return await response.json(); } catch (error) { return {}; }
    }

    document.getElementById("forgotPasswordForm").addEventListener("submit", async event => {
      event.preventDefault();
      const message = document.getElementById("message");
      const devLinkBox = document.getElementById("devLinkBox");
      message.textContent = "";
      devLinkBox.classList.add("hidden");
      devLinkBox.innerHTML = "";

      const response = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ identifier: document.getElementById("identifier").value.trim() })
      });

      const result = await readJson(response);
      message.textContent = result.error || result.message || "Запит оброблено";
      message.className = response.ok ? "success-message" : "error-message";

      if (result.dev_reset_link) {
        devLinkBox.classList.remove("hidden");
        devLinkBox.innerHTML = `
          <h2>Dev-режим</h2>
          <p>SMTP ще не налаштовано, тому посилання показано тут і продубльовано в консолі сервера.</p>
          <a href="${result.dev_reset_link}">${result.dev_reset_link}</a>
        `;
      }
    });
  </script>
</body>
</html>
