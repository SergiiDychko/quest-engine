<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редагування гри</title>
  <link rel="stylesheet" href="style.css" />
  <script src="content-renderer.js"></script>
  <script src="content-builder.js"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <a href="/admin.html">← Назад</a>

      <h1 id="gameTitle">Завантаження...</h1>

      <div class="game-header-editor">
        <div class="game-status-inline">
          <label for="gameStatusSelect">Статус</label>
          <select id="gameStatusSelect">
            <option value="DRAFT">DRAFT — в розробці</option>
            <option value="READY">READY — готова до проведення</option>
          </select>
          <span class="help-tooltip" tabindex="0" aria-label="READY означає, що гра готова до проведення і може бути обрана для нового запуску.">
            <span class="help-icon">?</span>
            <span class="help-tooltip-text">READY означає, що гра готова до проведення і може бути обрана для нового запуску.</span>
          </span>
          <button id="saveStatusBtn" type="button">Зберегти статус</button>
          <span id="saveStatusMessage"></span>
        </div>

        <p id="gameMeta"></p>
      </div>

      <hr />

      <h2>Сторінки гри</h2>

      <div id="gamePageTabs" class="game-page-tabs">
        Завантаження...
      </div>

      <div class="add-task-row">
        <button id="addTaskBtn">+ Додати завдання</button>
        <span id="addTaskMessage"></span>
      </div>

      <div id="tabContent" class="game-tab-content">
        Завантаження...
      </div>

      <p id="message"></p>
    </section>
  </main>

<script>
const params = new URLSearchParams(window.location.search);
const gameId = params.get("id");

let currentGame = null;
let currentTasks = [];
let currentPages = {};
let activeTab = "START";
let systemPageBuilder = null;

const pageLabels = {
  START: "Стартова",
  JOIN: "Реєстрація команди",
  FINISH: "Фінальна"
};

async function checkAuth() {
  const response = await fetch("/api/auth/me");
  const result = await response.json();

  if (!response.ok || !result.user) {
    window.location.href = "/login.html";
  }
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

async function loadGame() {
  const response = await fetch(`/api/games/${gameId}`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("gameTitle").textContent =
      result.error || "Помилка завантаження гри";
    return;
  }

  currentGame = result.game;

  document.getElementById("gameTitle").textContent = currentGame.title;
  document.getElementById("gameStatusSelect").value = currentGame.status || "DRAFT";
  document.getElementById("gameMeta").innerHTML = `
    Механіка: <strong>${currentGame.game_type}</strong><br>
    Умова перемоги: <strong>${currentGame.winner_type}</strong>
  `;
}

async function loadTasks() {
  const response = await fetch(`/api/games/${gameId}/tasks`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("tabContent").textContent =
      result.error || "Помилка завантаження завдань";
    return;
  }

  currentTasks = result.tasks || [];
}

async function loadPages() {
  const response = await fetch(`/api/pages/game/${gameId}`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("tabContent").textContent =
      result.error || "Помилка завантаження сторінок гри";
    return;
  }

  currentPages = result.pages || {};
}

function buildTabs() {
  const container = document.getElementById("gamePageTabs");

  const tabs = [];

  tabs.push({
    type: "page",
    key: "START",
    label: pageLabels.START
  });

  tabs.push({
    type: "page",
    key: "JOIN",
    label: pageLabels.JOIN
  });

  currentTasks.forEach(task => {
    tabs.push({
      type: "task",
      key: `TASK_${task.id}`,
      task,
      label: `Завдання ${task.sort_order}`
    });
  });

  tabs.push({
    type: "page",
    key: "FINISH",
    label: pageLabels.FINISH
  });

  container.innerHTML = tabs.map(tab => `
    <button
      class="game-page-tab ${activeTab === tab.key ? "active" : ""}"
      data-tab="${tab.key}"
    >
      ${escapeHtml(tab.label)}
    </button>
  `).join("");

  document.querySelectorAll(".game-page-tab").forEach(button => {
    button.addEventListener("click", () => {
      activeTab = button.dataset.tab;
      render();
    });
  });
}

function render() {
  buildTabs();

  if (activeTab === "START" || activeTab === "JOIN" || activeTab === "FINISH") {
    renderSystemPage(activeTab);
    return;
  }

  if (activeTab.startsWith("TASK_")) {
    const taskId = Number(activeTab.replace("TASK_", ""));
    const task = currentTasks.find(item => Number(item.id) === taskId);

    if (!task) {
      activeTab = "START";
      render();
      return;
    }

    renderTaskTab(task);
  }
}

function parsePageBlocks(page) {
  const raw = page && page.content ? page.content : "";

  try {
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      return parsed.map(block => ({
        type: block.type || "TEXT",
        content: block.content || block.data || {}
      }));
    }
  } catch (error) {}

  if (raw) {
    return [{
      type: "TEXT",
      content: JSON.stringify({ text: raw })
    }];
  }

  return [];
}

function renderSystemPage(pageType) {
  const page = currentPages[pageType] || {
    page_type: pageType,
    title: "",
    content: "",
    custom_css: ""
  };

  const content = document.getElementById("tabContent");

  content.innerHTML = `
    <div class="info-block page-editor-block">
      <h2>${escapeHtml(pageLabels[pageType])}</h2>

      <div class="form-row">
        <label>Заголовок сторінки</label>
        <input
          id="pageTitleInput"
          type="text"
          value="${escapeHtml(page.title || "")}"
        >
      </div>

      <h3>Конструктор сторінки</h3>
      <p class="muted-text">Додайте текст, зображення, відео, аудіо або власний HTML/CSS/JS. Порядок блоків можна змінювати кнопками ↑ та ↓.</p>
      <div id="systemPageBuilder" class="page-builder-root"></div>

      <div class="save-row">
        <button id="previewPageBtn" type="button">Попередній перегляд</button>
        <button id="savePageBtn" type="button">Зберегти всі зміни на сторінці</button>
        <span id="savePageMessage"></span>
      </div>
    </div>
  `;

  systemPageBuilder = new QEContentBuilder({
    root: document.getElementById("systemPageBuilder"),
    blocks: parsePageBlocks(page),
    previewTitle: page.title || pageLabels[pageType]
  });

  document.getElementById("previewPageBtn").addEventListener("click", () => {
    const title = document.getElementById("pageTitleInput").value.trim() || pageLabels[pageType];
    systemPageBuilder.openPreview(title);
  });

  document.getElementById("savePageBtn").addEventListener("click", () => {
    saveSystemPage(pageType);
  });
}

async function saveSystemPage(pageType) {
  const statusSaved = await saveGameStatus({ silent: true });

  if (!statusSaved) {
    return;
  }

  const payload = {
    title: document.getElementById("pageTitleInput").value.trim(),
    content: JSON.stringify(systemPageBuilder ? systemPageBuilder.getBlocks() : []),
    custom_css: ""
  };

  const response = await fetch(`/api/pages/game/${gameId}/${pageType}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const result = await response.json();
  const message = document.getElementById("savePageMessage");

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка збереження сторінки";
    return;
  }

  await loadPages();
  render();

  const updatedMessage = document.getElementById("savePageMessage");
  if (updatedMessage) {
    updatedMessage.className = "success-message";
    updatedMessage.textContent = "✓ Зміни збережено";

    setTimeout(() => {
      updatedMessage.textContent = "";
    }, 3000);
  }
}

async function saveGameStatus(options = {}) {
  const statusSelect = document.getElementById("gameStatusSelect");
  const message = document.getElementById("saveStatusMessage");
  const status = statusSelect.value;

  const response = await fetch(`/api/games/${gameId}/status`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ status })
  });

  const result = await response.json();

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка збереження статусу";
    return false;
  }

  currentGame.status = result.game.status;
  statusSelect.value = currentGame.status;

  if (!options.silent) {
    message.className = "success-message";
    message.textContent = "✓ Статус збережено";

    setTimeout(() => {
      message.textContent = "";
    }, 3000);
  }

  return true;
}

function renderTaskTab(task) {
  const content = document.getElementById("tabContent");

  content.innerHTML = `
    <div class="info-block page-editor-block">
      <h2>${escapeHtml(task.title || `Завдання ${task.sort_order}`)}</h2>

      <iframe
        id="taskEditorFrame"
        class="task-editor-frame"
        src="/task.html?id=${task.id}&game=${gameId}"
        title="Редактор завдання"
      ></iframe>

      <div class="save-row">
        <button id="saveTaskPageBtn">Зберегти всі зміни на сторінці</button>
        <span id="saveTaskPageMessage"></span>
      </div>
    </div>
  `;

  document.getElementById("saveTaskPageBtn").addEventListener("click", () => {
    saveTaskPageChanges();
  });
}

async function saveTaskPageChanges() {
  const message = document.getElementById("saveTaskPageMessage");
  const statusSaved = await saveGameStatus({ silent: true });

  if (!statusSaved) {
    message.className = "";
    message.textContent = "Помилка збереження статусу гри";
    return;
  }

  const frame = document.getElementById("taskEditorFrame");

  if (
    frame &&
    frame.contentWindow &&
    typeof frame.contentWindow.saveTaskChangesFromParent === "function"
  ) {
    const taskSaved = await frame.contentWindow.saveTaskChangesFromParent();

    if (!taskSaved || taskSaved.ok === false) {
      message.className = "";
      message.textContent = taskSaved?.error || "Помилка збереження завдання";
      return;
    }
  }

  await loadGame();
  await loadTasks();
  await loadPages();
  render();

  const updatedMessage = document.getElementById("saveTaskPageMessage");
  if (updatedMessage) {
    updatedMessage.className = "success-message";
    updatedMessage.textContent = "✓ Зміни збережено";

    setTimeout(() => {
      updatedMessage.textContent = "";
    }, 3000);
  }
}

document.getElementById("saveStatusBtn").addEventListener("click", () => {
  saveGameStatus();
});

document.getElementById("addTaskBtn").addEventListener("click", async () => {
  const nextNumber = currentTasks.length + 1;

  const response = await fetch(`/api/games/${gameId}/tasks`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: `Завдання ${nextNumber}`,
      task_type: "STANDARD"
    })
  });

  const result = await response.json();
  const message = document.getElementById("addTaskMessage");

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка створення завдання";
    return;
  }

  message.className = "success-message";
  message.textContent = "✓ Завдання створено";

  setTimeout(() => {
    message.textContent = "";
  }, 3000);

  await loadTasks();

  const newTask = currentTasks[currentTasks.length - 1];

  if (newTask) {
    activeTab = `TASK_${newTask.id}`;
  }

  render();
});

async function init() {
  await checkAuth();
  await loadGame();
  await loadPages();
  await loadTasks();
  render();
}

init();
</script>
</body>
</html>
