<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редагування гри</title>
  <link rel="stylesheet" href="style.css" />
  <script src="content-renderer.js"></script>
  <script src="content-builder.js"></script>
</head>
<body>
  <main class="app">
    <section class="card">
      <a href="/admin.html">← Назад</a>

      <h1 id="gameTitle">Завантаження...</h1>

      <div class="game-header-editor">
        <div class="game-status-inline">
          <label for="gameStatusSelect">Статус</label>
          <select id="gameStatusSelect">
            <option value="DRAFT">DRAFT — в розробці</option>
            <option value="READY">READY — готова до проведення</option>
          </select>
          <span class="help-tooltip" tabindex="0" aria-label="READY означає, що гра готова до проведення і може бути обрана для нового запуску.">
            <span class="help-icon">?</span>
            <span class="help-tooltip-text">READY означає, що гра готова до проведення і може бути обрана для нового запуску.</span>
          </span>
          <span id="saveStatusMessage" class="inline-save-message"></span>
        </div>

        <p id="gameMeta"></p>
      </div>

      <hr />

      <h2>Сторінки гри</h2>

      <div id="gamePageTabs" class="game-page-tabs">
        Завантаження...
      </div>

      <div class="add-task-row">
        <button id="addTaskBtn">+ Додати завдання</button>
        <span id="addTaskMessage"></span>
      </div>

      <div id="tabContent" class="game-tab-content">
        Завантаження...
      </div>

      <p id="message"></p>
    </section>
  </main>

<script>
const params = new URLSearchParams(window.location.search);
const gameId = params.get("id");

let currentGame = null;
let currentTasks = [];
let currentPages = {};
let availableGames = [];
let activeTab = "START";
let systemPageBuilder = null;

const pageLabels = {
  START: "Стартова",
  JOIN: "Реєстрація команди",
  FINISH: "Фінальна"
};

async function checkAuth() {
  const response = await fetch("/api/auth/me");
  const result = await response.json();

  if (!response.ok || !result.user) {
    window.location.href = "/login.html";
  }
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

async function loadGame() {
  const response = await fetch(`/api/games/${gameId}`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("gameTitle").textContent =
      result.error || "Помилка завантаження гри";
    return;
  }

  currentGame = result.game;

  document.getElementById("gameTitle").textContent = currentGame.title;
  document.getElementById("gameStatusSelect").value = currentGame.status || "DRAFT";
  document.getElementById("gameMeta").innerHTML = `
    Механіка: <strong>${currentGame.game_type}</strong><br>
    Умова перемоги: <strong>${currentGame.winner_type}</strong>
  `;
}

async function loadTasks() {
  const response = await fetch(`/api/games/${gameId}/tasks`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("tabContent").textContent =
      result.error || "Помилка завантаження завдань";
    return;
  }

  currentTasks = result.tasks || [];
}

async function loadAvailableGames() {
  const response = await fetch("/api/games/catalog");
  const result = await response.json();

  if (!response.ok) {
    availableGames = [];
    return;
  }

  availableGames = result.games || [];
}

async function loadPages() {
  const response = await fetch(`/api/pages/game/${gameId}`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("tabContent").textContent =
      result.error || "Помилка завантаження сторінок гри";
    return;
  }

  currentPages = result.pages || {};
}

function activeTaskFrameHasUnsavedDraft() {
  const frame = document.getElementById("taskEditorFrame");
  try {
    return Boolean(frame?.contentWindow?.hasUnsavedTaskDraft?.());
  } catch (error) {
    return false;
  }
}

function confirmLeaveTaskEditorWithUnsavedDraft() {
  if (!activeTaskFrameHasUnsavedDraft()) return true;
  return confirm("У поточному завданні є незбережена локальна чернетка. Перейти без збереження?");
}

function buildTabs() {
  const container = document.getElementById("gamePageTabs");

  const tabs = [];

  tabs.push({
    type: "page",
    key: "START",
    label: pageLabels.START
  });

  tabs.push({
    type: "page",
    key: "JOIN",
    label: pageLabels.JOIN
  });

  currentTasks.forEach(task => {
    tabs.push({
      type: "task",
      key: `TASK_${task.id}`,
      task,
      label: `Завдання ${task.sort_order}`
    });
  });

  tabs.push({
    type: "page",
    key: "FINISH",
    label: pageLabels.FINISH
  });

  container.innerHTML = tabs.map(tab => `
    <button
      class="game-page-tab ${activeTab === tab.key ? "active" : ""}"
      data-tab="${tab.key}"
    >
      ${escapeHtml(tab.label)}
    </button>
  `).join("");

  document.querySelectorAll(".game-page-tab").forEach(button => {
    button.addEventListener("click", () => {
      if (button.dataset.tab !== activeTab && !confirmLeaveTaskEditorWithUnsavedDraft()) {
        return;
      }
      activeTab = button.dataset.tab;
      render();
    });
  });
}

function render() {
  buildTabs();

  if (activeTab === "START" || activeTab === "JOIN" || activeTab === "FINISH") {
    renderSystemPage(activeTab);
    return;
  }

  if (activeTab.startsWith("TASK_")) {
    const taskId = Number(activeTab.replace("TASK_", ""));
    const task = currentTasks.find(item => Number(item.id) === taskId);

    if (!task) {
      activeTab = "START";
      render();
      return;
    }

    renderTaskTab(task);
  }
}

function parsePageBlocks(page) {
  const raw = page && page.content ? page.content : "";

  try {
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      return parsed.map(block => ({
        type: block.type || "TEXT",
        content: block.content || block.data || {}
      }));
    }
  } catch (error) {}

  if (raw) {
    return [{
      type: "TEXT",
      content: JSON.stringify({ text: raw })
    }];
  }

  return [];
}

function parseRegistrationSettings(page) {
  const fallback = {
    heading: page?.title || "Реєстрація команди",
    description: "Введіть назву команди, щоб отримати посилання на гру.",
    button_text: "Створити команду"
  };

  if (!page || !page.content) return fallback;

  try {
    const parsed = JSON.parse(page.content);
    if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
      return {
        heading: parsed.heading || fallback.heading,
        description: parsed.description || fallback.description,
        button_text: parsed.button_text || fallback.button_text
      };
    }
  } catch (error) {
    return {
      ...fallback,
      description: String(page.content || fallback.description)
    };
  }

  return fallback;
}

function renderSystemPage(pageType) {
  const page = currentPages[pageType] || {
    page_type: pageType,
    title: "",
    content: "",
    custom_css: ""
  };

  if (pageType === "JOIN") {
    renderRegistrationSettingsPage(page);
    return;
  }

  const content = document.getElementById("tabContent");

  content.innerHTML = `
    <div class="info-block page-editor-block">
      <h2>${escapeHtml(pageLabels[pageType])}</h2>

      <div class="form-row">
        <label>Заголовок сторінки</label>
        <input
          id="pageTitleInput"
          type="text"
          value="${escapeHtml(page.title || "")}"
        >
      </div>

      <h3>Конструктор сторінки</h3>
      <p class="muted-text">Додайте текст, зображення, відео, аудіо або власний HTML/CSS/JS. Порядок блоків можна змінювати кнопками ↑ та ↓.</p>
      <div id="systemPageBuilder" class="page-builder-root"></div>

      <div class="save-row editor-sticky-actions">
        <button id="previewPageBtn" type="button">Попередній перегляд</button>
        <button id="savePageBtn" type="button">Зберегти всі зміни на сторінці</button>
        <span id="savePageMessage"></span>
      </div>
    </div>
  `;

  systemPageBuilder = new QEContentBuilder({
    root: document.getElementById("systemPageBuilder"),
    blocks: parsePageBlocks(page),
    previewTitle: page.title || pageLabels[pageType]
  });

  document.getElementById("previewPageBtn").addEventListener("click", () => {
    const title = document.getElementById("pageTitleInput").value.trim() || pageLabels[pageType];
    systemPageBuilder.openPreview(title);
  });

  document.getElementById("savePageBtn").addEventListener("click", () => {
    saveSystemPage(pageType);
  });
}

function renderRegistrationSettingsPage(page) {
  const settings = parseRegistrationSettings(page);
  const content = document.getElementById("tabContent");

  content.innerHTML = `
    <div class="info-block page-editor-block">
      <h2>${escapeHtml(pageLabels.JOIN)}</h2>
      <p class="muted-text">
        Це системна сторінка реєстрації команди. Тут можна змінити тексти й CSS,
        але поле назви команди, кнопка створення та посилання на гру залишаються системними.
      </p>

      <div class="form-row">
        <label>Заголовок</label>
        <input id="registrationHeadingInput" type="text" value="${escapeHtml(settings.heading)}">
      </div>

      <div class="form-row">
        <label>Опис / інструкція</label>
        <textarea id="registrationDescriptionInput" rows="4">${escapeHtml(settings.description)}</textarea>
      </div>

      <div class="form-row">
        <label>Текст кнопки</label>
        <input id="registrationButtonTextInput" type="text" value="${escapeHtml(settings.button_text)}">
      </div>

      <div class="form-row">
        <label>CSS сторінки реєстрації</label>
        <textarea id="registrationCssInput" rows="10" placeholder=".registration-card { ... }">${escapeHtml(page.custom_css || "")}</textarea>
      </div>

      <details class="registration-preview-details">
        <summary>Показати схематичний вигляд системної сторінки</summary>
        <div class="registration-preview-box">
          <h1>${escapeHtml(settings.heading)}</h1>
          <p>${escapeHtml(settings.description)}</p>
          <input type="text" placeholder="Наприклад: Месники" disabled>
          <button type="button" disabled>${escapeHtml(settings.button_text)}</button>
        </div>
      </details>

      <div class="save-row editor-sticky-actions">
        <button id="savePageBtn" type="button">Зберегти всі зміни на сторінці</button>
        <span id="savePageMessage"></span>
      </div>
    </div>
  `;

  systemPageBuilder = null;

  document.getElementById("savePageBtn").addEventListener("click", () => {
    saveSystemPage("JOIN");
  });
}

async function saveSystemPage(pageType) {
  const statusSaved = await saveGameStatus({ silent: true });

  if (!statusSaved) {
    return;
  }

  let payload;

  if (pageType === "JOIN") {
    const heading = document.getElementById("registrationHeadingInput").value.trim();
    const description = document.getElementById("registrationDescriptionInput").value.trim();
    const buttonText = document.getElementById("registrationButtonTextInput").value.trim();
    const css = document.getElementById("registrationCssInput").value;

    payload = {
      title: heading,
      content: JSON.stringify({
        heading,
        description,
        button_text: buttonText || "Створити команду"
      }),
      custom_css: css || ""
    };
  } else {
    let blocks;
    try {
      blocks = systemPageBuilder ? systemPageBuilder.getBlocks() : [];
    } catch (error) {
      const message = document.getElementById("savePageMessage");
      if (message) {
        message.className = "error-text";
        message.textContent = error.message || "Помилка перевірки секцій";
      }
      return;
    }

    payload = {
      title: document.getElementById("pageTitleInput").value.trim(),
      content: JSON.stringify(blocks),
      custom_css: ""
    };
  }

  const response = await fetch(`/api/pages/game/${gameId}/${pageType}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const result = await response.json();
  const message = document.getElementById("savePageMessage");

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка збереження сторінки";
    return;
  }

  await loadPages();
  render();

  const updatedMessage = document.getElementById("savePageMessage");
  if (updatedMessage) {
    updatedMessage.className = "success-message";
    updatedMessage.textContent = "✓ Зміни збережено";

    setTimeout(() => {
      updatedMessage.textContent = "";
    }, 3000);
  }
}

async function saveGameStatus(options = {}) {
  const statusSelect = document.getElementById("gameStatusSelect");
  const message = document.getElementById("saveStatusMessage");
  const status = statusSelect.value;

  const response = await fetch(`/api/games/${gameId}/status`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ status })
  });

  const result = await response.json();

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка збереження статусу";
    return false;
  }

  currentGame.status = result.game.status;
  statusSelect.value = currentGame.status;

  if (!options.silent) {
    message.className = "success-message";
    message.textContent = "✓ Статус збережено";

    setTimeout(() => {
      message.textContent = "";
    }, 3000);
  }

  return true;
}

function renderTaskTab(task) {
  const content = document.getElementById("tabContent");
  const taskIndex = currentTasks.findIndex(item => Number(item.id) === Number(task.id));
  const canMoveLeft = taskIndex > 0;
  const canMoveRight = taskIndex >= 0 && taskIndex < currentTasks.length - 1;
  const currentNumber = Number(task.sort_order) || taskIndex + 1;
  const gameOptions = availableGames.map(game => `
    <option value="${Number(game.id)}" ${Number(game.id) === Number(gameId) ? "selected" : ""}>
      ${escapeHtml(game.title || `Гра #${game.id}`)}${Number(game.id) === Number(gameId) ? " — ця гра" : ""}
    </option>
  `).join("");

  const typeOptions = [
    ["STANDARD", "STANDARD"],
    ["OLYMPIAD", "OLYMPIAD"],
    ["MULTITASK", "MULTITASK"]
  ].map(([value, label]) => `
    <option value="${value}" ${String(task.task_type || "STANDARD").toUpperCase() === value ? "selected" : ""}>${label}</option>
  `).join("");

  content.innerHTML = `
    <div class="info-block page-editor-block task-editor-shell">
      <div class="task-compact-toolbar task-compact-toolbar-split">
        <div class="task-compact-main">
          <label class="task-compact-name">
            <span>Завдання:</span>
            <input id="parentTaskTitleInput" type="text" value="${escapeHtml(task.title || "")}" placeholder="Завдання без назви">
          </label>

          <div class="task-compact-meta-row">
            <label class="task-compact-type">
              <span>Тип:</span>
              <select id="parentTaskTypeSelect">${typeOptions}</select>
            </label>

            <div class="task-compact-position" aria-label="Позиція завдання">
              <span>Позиція:</span>
              <button id="moveTaskLeftBtn" type="button" title="Перемістити ліворуч" ${canMoveLeft ? "" : "disabled"}>‹</button>
              <strong>№${currentNumber}</strong>
              <button id="moveTaskRightBtn" type="button" title="Перемістити праворуч" ${canMoveRight ? "" : "disabled"}>›</button>
            </div>
          </div>
        </div>

        <div class="task-compact-side">
          <div class="task-compact-copy">
            <span>Скопіювати в гру:</span>
            <select id="copyTaskTargetSelect">${gameOptions}</select>
            <button id="copyTaskBtn" type="button">OK</button>
            <span id="copyTaskMessage"></span>
          </div>

          <button id="parentDeleteTaskBtn" type="button" class="danger-btn task-compact-delete">Видалити</button>
        </div>
      </div>

      <iframe
        id="taskEditorFrame"
        class="task-editor-frame compact-parent-frame"
        src="/task.html?id=${task.id}&game=${gameId}&embedded=1"
        title="Редактор завдання"
      ></iframe>

      <div class="save-row editor-sticky-actions">
        <button id="previewTaskPageBtn" type="button">Попередній перегляд</button>
        <button id="saveTaskPageBtn">Зберегти всі зміни на сторінці</button>
        <span id="saveTaskPageMessage"></span>
      </div>
    </div>
  `;

  document.getElementById("parentTaskTitleInput")?.addEventListener("blur", () => {
    updateTaskHeaderFromParent(task.id);
  });

  document.getElementById("parentTaskTypeSelect")?.addEventListener("change", () => {
    updateTaskHeaderFromParent(task.id, { reloadIframe: true });
  });

  document.getElementById("moveTaskLeftBtn")?.addEventListener("click", () => {
    moveTask(task.id, -1);
  });

  document.getElementById("moveTaskRightBtn")?.addEventListener("click", () => {
    moveTask(task.id, 1);
  });

  document.getElementById("copyTaskBtn")?.addEventListener("click", () => {
    copyTask(task.id);
  });

  document.getElementById("parentDeleteTaskBtn")?.addEventListener("click", () => {
    deleteTaskFromParent(task.id);
  });

  document.getElementById("previewTaskPageBtn")?.addEventListener("click", () => {
    const frame = document.getElementById("taskEditorFrame");
    const previewFn = frame?.contentWindow?.previewTaskFromParent;

    if (typeof previewFn === "function") {
      previewFn();
      return;
    }

    alert("Попередній перегляд ще не готовий. Спробуйте після завантаження редактора.");
  });

  document.getElementById("saveTaskPageBtn").addEventListener("click", () => {
    saveTaskPageChanges();
  });
}

async function updateTaskHeaderFromParent(taskId, options = {}) {
  const titleInput = document.getElementById("parentTaskTitleInput");
  const typeSelect = document.getElementById("parentTaskTypeSelect");
  const task = currentTasks.find(item => Number(item.id) === Number(taskId));

  const title = titleInput?.value || "";
  const task_type = typeSelect?.value || task?.task_type || "STANDARD";

  const response = await fetch(`/api/tasks/${taskId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      task_type,
      hide_answers_block: ["OLYMPIAD", "MULTITASK"].includes(task_type),
      score_points: Number(task?.score_points) || 0
    })
  });

  const result = await response.json();
  if (!response.ok) {
    alert(result.error || "Помилка збереження завдання");
    return;
  }

  if (task) {
    task.title = title.trim();
    task.task_type = task_type;
  }

  const frame = document.getElementById("taskEditorFrame");
  try {
    const childDoc = frame?.contentDocument;
    const childTitle = childDoc?.getElementById("taskNameInput");
    const childType = childDoc?.getElementById("taskTypeSelect");
    if (childTitle) childTitle.value = title;
    if (childType) childType.value = task_type;
  } catch (error) {}

  if (options.reloadIframe && frame) {
    frame.contentWindow?.location?.reload();
  }
}

async function deleteTaskFromParent(taskId) {
  if (!confirm("Видалити це завдання?")) return;
  if (!confirmLeaveTaskEditorWithUnsavedDraft()) return;

  const response = await fetch(`/api/tasks/${taskId}`, { method: "DELETE" });
  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Помилка видалення завдання");
    return;
  }

  await loadTasks();
  activeTab = currentTasks[0] ? `TASK_${currentTasks[0].id}` : "START";
  render();
}

async function moveTask(taskId, direction) {
  if (!confirmLeaveTaskEditorWithUnsavedDraft()) return;
  const index = currentTasks.findIndex(item => Number(item.id) === Number(taskId));
  const targetIndex = index + direction;

  if (index < 0 || targetIndex < 0 || targetIndex >= currentTasks.length) {
    return;
  }

  const reordered = [...currentTasks];
  const [task] = reordered.splice(index, 1);
  reordered.splice(targetIndex, 0, task);

  const response = await fetch(`/api/games/${gameId}/tasks/reorder`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      task_ids: reordered.map(item => Number(item.id))
    })
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Помилка зміни порядку завдань");
    return;
  }

  await loadTasks();
  activeTab = `TASK_${taskId}`;
  render();
}

async function copyTask(taskId) {
  if (!confirmLeaveTaskEditorWithUnsavedDraft()) return;
  const targetSelect = document.getElementById("copyTaskTargetSelect");
  const message = document.getElementById("copyTaskMessage");
  const targetGameId = Number(targetSelect?.value);

  if (!targetGameId) {
    message.className = "";
    message.textContent = "Оберіть гру";
    return;
  }

  const response = await fetch(`/api/games/${gameId}/tasks/${taskId}/copy`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      target_game_id: targetGameId
    })
  });

  const result = await response.json();

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка копіювання";
    return;
  }

  message.className = "success-message";
  message.textContent = "✓ Завдання скопійовано";

  if (Number(targetGameId) === Number(gameId)) {
    await loadTasks();
    activeTab = `TASK_${result.task.id}`;
    render();
  }
}

async function saveTaskPageChanges() {
  const message = document.getElementById("saveTaskPageMessage");
  const statusSaved = await saveGameStatus({ silent: true });

  if (!statusSaved) {
    message.className = "";
    message.textContent = "Помилка збереження статусу гри";
    return;
  }

  const frame = document.getElementById("taskEditorFrame");

  if (
    frame &&
    frame.contentWindow &&
    typeof frame.contentWindow.saveTaskChangesFromParent === "function"
  ) {
    const taskSaved = await frame.contentWindow.saveTaskChangesFromParent();

    if (!taskSaved || taskSaved.ok === false) {
      message.className = "";
      message.textContent = taskSaved?.error || "Помилка збереження завдання";
      return;
    }
  }

  await loadGame();
  await loadTasks();
  await loadPages();
  render();

  const updatedMessage = document.getElementById("saveTaskPageMessage");
  if (updatedMessage) {
    updatedMessage.className = "success-message";
    updatedMessage.textContent = "✓ Зміни збережено";

    setTimeout(() => {
      updatedMessage.textContent = "";
    }, 3000);
  }
}

document.getElementById("gameStatusSelect").addEventListener("change", () => {
  saveGameStatus();
});

document.getElementById("addTaskBtn").addEventListener("click", async () => {
  const nextNumber = currentTasks.length + 1;

  const response = await fetch(`/api/games/${gameId}/tasks`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: `Завдання ${nextNumber}`,
      task_type: "STANDARD"
    })
  });

  const result = await response.json();
  const message = document.getElementById("addTaskMessage");

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка створення завдання";
    return;
  }

  message.className = "success-message";
  message.textContent = "✓ Завдання створено";

  setTimeout(() => {
    message.textContent = "";
  }, 3000);

  await loadTasks();

  const newTask = currentTasks[currentTasks.length - 1];

  if (newTask) {
    activeTab = `TASK_${newTask.id}`;
  }

  render();
});

window.addEventListener("beforeunload", event => {
  if (!activeTaskFrameHasUnsavedDraft()) return;
  event.preventDefault();
  event.returnValue = "";
});

async function init() {
  await checkAuth();
  await loadGame();
  await loadPages();
  await loadTasks();
  await loadAvailableGames();
  render();
}

init();
</script>
</body>
</html>
