<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог ігор</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .copy-game-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.45);
    }

    .copy-game-modal.visible {
      display: flex;
    }

    .copy-game-dialog {
      width: min(560px, 100%);
      max-height: calc(100vh - 40px);
      overflow: auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.25);
    }

    .copy-game-dialog h2 {
      margin-top: 0;
    }

    .copy-game-dialog label {
      display: block;
      margin: 12px 0;
    }

    .copy-game-dialog input,
    .copy-game-dialog textarea,
    .copy-game-dialog select {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
    }

    .copy-game-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <a href="/admin.html">← Назад</a>

      <h1>Каталог ігор</h1>

      <div class="catalog-filters info-block">
        <div class="filter-row">
          <strong>Механіка:</strong>
          <button type="button" class="filter-btn active" data-mechanic-filter="ALL">Усі</button>
          <button type="button" class="filter-btn" data-mechanic-filter="LINEAR">LINEAR</button>
          <button type="button" class="filter-btn" data-mechanic-filter="STORM">STORM</button>
        </div>
        <div class="filter-row">
          <strong>Умова перемоги:</strong>
          <button type="button" class="filter-btn active" data-winner-filter="ALL">Усі</button>
          <button type="button" class="filter-btn" data-winner-filter="TIME">TIME</button>
          <button type="button" class="filter-btn" data-winner-filter="POINTS">POINTS</button>
        </div>
      </div>

      <div class="info-block">
        <table class="codes-table">
          <thead>
            <tr>
              <th>Назва гри</th>
              <th>Механіка</th>
              <th>Умова перемоги</th>
              <th>Кількість завдань</th>
              <th>Статус</th>
              <th>Запуски</th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody id="gamesTableBody">
            <tr>
              <td colspan="7">Завантаження...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>


  <div id="copyGameModal" class="copy-game-modal" aria-hidden="true">
    <div class="copy-game-dialog" role="dialog" aria-modal="true" aria-labelledby="copyGameTitle">
      <h2 id="copyGameTitle">Створити копію гри</h2>

      <input id="copyGameSourceId" type="hidden">

      <label>
        Назва гри
        <input id="copyGameNewTitle" type="text">
      </label>

      <label>
        Короткий опис
        <textarea id="copyGameDescription" rows="4"></textarea>
      </label>

      <label>
        Механіка гри
        <select id="copyGameType">
          <option value="LINEAR">LINEAR</option>
          <option value="STORM">STORM</option>
        </select>
      </label>

      <label>
        Умова перемоги
        <select id="copyWinnerType">
          <option value="TIME">TIME</option>
          <option value="POINTS">POINTS</option>
        </select>
      </label>

      <div class="copy-game-actions">
        <button id="cancelCopyGameBtn" type="button">Скасувати</button>
        <button id="saveCopyGameBtn" type="button">Зберегти</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let allGames = [];
    let selectedMechanicFilter = "ALL";
    let selectedWinnerFilter = "ALL";

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function escapeJs(text) {
      return String(text || "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll("\n", " ")
        .replaceAll("\r", " ");
    }

    async function checkAuth() {
      const response = await fetch("/api/auth/me");
      const result = await response.json();

      if (!response.ok || !result.user) {
        window.location.href = "/login.html";
        return;
      }

      currentUser = result.user;
    }

    async function loadGames() {
      const response = await fetch("/api/games/catalog");
      const result = await response.json();
      const tableBody = document.getElementById("gamesTableBody");

      if (!response.ok) {
        tableBody.innerHTML = `<tr><td colspan="7">${escapeHtml(result.error || "Помилка завантаження")}</td></tr>`;
        return;
      }

      allGames = result.games || [];
      renderGames();
    }


    function getFilteredGames() {
      return allGames.filter(game => {
        const mechanic = String(game.game_type || "LINEAR").toUpperCase();
        const winner = String(game.winner_type || "TIME").toUpperCase();
        return (selectedMechanicFilter === "ALL" || mechanic === selectedMechanicFilter)
          && (selectedWinnerFilter === "ALL" || winner === selectedWinnerFilter);
      });
    }

    function canDeleteGame(game) {
      if (!currentUser) return false;
      return currentUser.role === "ADMIN" || Number(game.created_by) === Number(currentUser.id);
    }

    function renderGames() {
      const tableBody = document.getElementById("gamesTableBody");
      const games = getFilteredGames();

      if (!allGames.length) {
        tableBody.innerHTML = '<tr><td colspan="7">Ігор поки немає.</td></tr>';
        return;
      }

      if (!games.length) {
        tableBody.innerHTML = '<tr><td colspan="7">Немає ігор за обраними фільтрами.</td></tr>';
        return;
      }

      tableBody.innerHTML = games.map(game => `
        <tr class="clickable-row">
          <td onclick="openGame(${game.id})">
            <strong>${escapeHtml(game.title)}</strong>
          </td>
          <td onclick="openGame(${game.id})">${escapeHtml(game.game_type)}</td>
          <td onclick="openGame(${game.id})">${escapeHtml(game.winner_type)}</td>
          <td onclick="openGame(${game.id})">${Number(game.tasks_count || 0)}</td>
          <td onclick="openGame(${game.id})">${escapeHtml(game.status)}</td>
          <td>
            <button onclick="openRuns(${game.id})" type="button">Переглянути запуски</button>
          </td>
          <td>
            <button onclick="openCopyGameModal(${game.id})" type="button">Створити копію гри</button>
            ${canDeleteGame(game) ? `<button onclick="deleteGame(${game.id}, '${escapeJs(game.title)}')" type="button">Видалити</button>` : ""}
          </td>
        </tr>
      `).join("");
    }

    function setupFilters() {
      document.querySelectorAll("[data-mechanic-filter]").forEach(button => {
        button.addEventListener("click", () => {
          selectedMechanicFilter = button.dataset.mechanicFilter;
          document.querySelectorAll("[data-mechanic-filter]").forEach(item => item.classList.toggle("active", item === button));
          renderGames();
        });
      });

      document.querySelectorAll("[data-winner-filter]").forEach(button => {
        button.addEventListener("click", () => {
          selectedWinnerFilter = button.dataset.winnerFilter;
          document.querySelectorAll("[data-winner-filter]").forEach(item => item.classList.toggle("active", item === button));
          renderGames();
        });
      });
    }

    function openGame(gameId) {
      window.location.href = `/game.html?id=${gameId}`;
    }

    function openRuns(gameId) {
      window.location.href = `/runs.html?id=${gameId}`;
    }


    async function deleteGame(gameId, title) {
      const confirmed = confirm(`Видалити гру "${title}"?\n\nЦе видалить гру, її завдання, запуски та статистику. Дію неможливо скасувати.`);
      if (!confirmed) return;

      const password = prompt("Введіть свій пароль для підтвердження видалення гри");
      if (!password) return;

      const response = await fetch(`/api/games/${gameId}`, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password })
      });

      const result = await response.json();
      if (!response.ok) {
        alert(result.error || "Помилка видалення гри");
        return;
      }

      await loadGames();
    }


    function normalizeGameType(value) {
      const type = String(value || "LINEAR").trim().toUpperCase();
      return ["LINEAR", "STORM"].includes(type) ? type : "LINEAR";
    }

    function normalizeWinnerType(value) {
      const type = String(value || "TIME").trim().toUpperCase();
      return ["TIME", "POINTS"].includes(type) ? type : "TIME";
    }

    function getGameById(gameId) {
      return allGames.find(game => Number(game.id) === Number(gameId));
    }

    function openCopyGameModal(gameId) {
      const game = getGameById(gameId);

      if (!game) {
        alert("Гру не знайдено");
        return;
      }

      document.getElementById("copyGameSourceId").value = game.id;
      document.getElementById("copyGameNewTitle").value = `${game.title || ""} — копія`;
      document.getElementById("copyGameDescription").value = game.description || "";
      document.getElementById("copyGameType").value = normalizeGameType(game.game_type);
      document.getElementById("copyWinnerType").value = normalizeWinnerType(game.winner_type);

      const modal = document.getElementById("copyGameModal");
      modal.classList.add("visible");
      modal.setAttribute("aria-hidden", "false");
      document.getElementById("copyGameNewTitle").focus();
    }

    function closeCopyGameModal() {
      const modal = document.getElementById("copyGameModal");
      modal.classList.remove("visible");
      modal.setAttribute("aria-hidden", "true");
    }

    async function submitCopyGameForm() {
      const gameId = Number(document.getElementById("copyGameSourceId").value);
      const title = document.getElementById("copyGameNewTitle").value.trim();
      const description = document.getElementById("copyGameDescription").value.trim();
      const game_type = normalizeGameType(document.getElementById("copyGameType").value);
      const winner_type = normalizeWinnerType(document.getElementById("copyWinnerType").value);

      if (!gameId) {
        alert("Не визначено гру для копіювання");
        return;
      }

      if (!title) {
        alert("Вкажіть назву копії гри");
        document.getElementById("copyGameNewTitle").focus();
        return;
      }

      const saveButton = document.getElementById("saveCopyGameBtn");
      saveButton.disabled = true;
      saveButton.textContent = "Збереження...";

      try {
        const response = await fetch(`/api/games/${gameId}/copy`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, description, game_type, winner_type })
        });

        const result = await response.json();

        if (!response.ok) {
          alert(result.error || "Помилка створення копії гри");
          return;
        }

        window.location.href = `/game.html?id=${result.game.id}`;
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "Зберегти";
      }
    }

    function setupCopyGameModal() {
      document.getElementById("cancelCopyGameBtn").addEventListener("click", closeCopyGameModal);
      document.getElementById("saveCopyGameBtn").addEventListener("click", submitCopyGameForm);

      document.getElementById("copyGameModal").addEventListener("click", event => {
        if (event.target.id === "copyGameModal") {
          closeCopyGameModal();
        }
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          closeCopyGameModal();
        }
      });
    }

    async function init() {
      await checkAuth();
      setupFilters();
      setupCopyGameModal();
      await loadGames();
    }

    init();
  </script>
</body>
</html>
