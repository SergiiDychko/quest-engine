<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Engine - Вхід</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

<main class="app auth-page login-page">
    <section class="card auth-card">

        <h1>Quest Engine</h1>

        <p>Вхід до панелі керування</p>

        <form id="loginForm">

            <input
                type="text"
                id="identifier"
                placeholder="Логін або email"
                autocomplete="username"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Пароль"
                autocomplete="current-password"
                required
            >

            <button type="submit">
                Увійти
            </button>

        </form>

        <p class="auth-secondary-link"><a href="/forgot-password.html">Забули пароль?</a></p>

        <div id="message"></div>

    </section>
</main>

<script>
document
    .getElementById("loginForm")
    .addEventListener("submit", async (e) => {

        e.preventDefault();

        const identifier =
            document.getElementById("identifier").value;

        const password =
            document.getElementById("password").value;

        const response = await fetch(
            "/api/auth/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    identifier,
                    password
                })
            }
        );

        const result = await response.json();

        if (response.ok) {

            window.location.href = "/admin.html";

        } else {

            document.getElementById("message").innerText =
                result.error;

        }

    });
</script>

</body>
</html>
