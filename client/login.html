<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Engine - Вхід</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>Quest Engine</h1>

        <p>Вхід до панелі керування</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Пароль"
                required
            >

            <button type="submit">
                Увійти
            </button>

        </form>

        <div id="message"></div>

    </div>
</div>

<script>
document
    .getElementById("loginForm")
    .addEventListener("submit", async (e) => {

        e.preventDefault();

        const email =
            document.getElementById("email").value;

        const password =
            document.getElementById("password").value;

        const response = await fetch(
            "/api/auth/login",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const result = await response.json();

        if (response.ok) {

            window.location.href = "/admin.html";

        } else {

            document.getElementById("message").innerText =
                result.error;

        }

    });
</script>

</body>
</html>
