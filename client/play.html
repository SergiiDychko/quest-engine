<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Гра</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="game-layout">

  <div id="waitingScreen" class="card hidden">
    <h1 id="waitingGameTitle">Гра</h1>
    <p id="waitingTeamName"></p>
    <div id="waitingStartCountdown" class="waiting-start-countdown hidden"></div>
    <div id="waitingContent" class="task-content"></div>
  </div>

  <div id="noTasksScreen" class="card hidden">
    <h1>У цій грі ще немає завдань</h1>
  </div>

  <div id="finishedScreen" class="card hidden">
    <h1 id="finishedTitle">Вітаємо! Ви завершили гру.</h1>
    <div id="finishedContent" class="task-content"></div>
  </div>

  <section id="gameScreen" class="hidden">

    <div class="fixed-answer-wrapper">

      <div class="player-team-row">
        <div>
          Команда:
          <strong id="teamNameDisplay"></strong>
        </div>

        <button
          id="editTeamNameBtn"
          class="small-light-btn"
          title="Змінити назву команди"
        >
          ✏️
        </button>

        <div id="stormHeaderTimer" class="storm-header-timer hidden"></div>
      </div>

      <div id="teamNameEditBlock" class="team-name-edit hidden">
        <input id="teamNameInput" type="text" placeholder="Назва команди">
        <button id="saveTeamNameBtn">Зберегти</button>
        <button id="cancelTeamNameBtn">Скасувати</button>
        <span id="teamNameMessage"></span>
      </div>

      <div class="fixed-answer-bar">
        <input id="answerInput" type="text" placeholder="Введіть відповідь">
        <button id="submitAnswerBtn">Відправити</button>
      </div>

      <div id="answerMessage"></div>

    </div>

    <div class="card task-card">

      <h1 id="gameTitle" class="hidden"></h1>

      <div id="stormTabs" class="storm-tabs hidden"></div>
      <div id="stormBriefingBlock" class="storm-briefing hidden"></div>

      <h2 id="taskTitle"></h2>

      <div id="stormTaskAutoTimer" class="storm-task-auto-timer hidden"></div>

      <div id="taskContent" class="task-content"></div>

      <div id="olympiadBlock" class="olympiad-player-block hidden"></div>
      <div id="multitaskBlock" class="multitask-player-block hidden"></div>

      <div id="formatBlock" class="info-block hidden">
        <h3>Відповіді</h3>
        <div id="formatContent"></div>
      </div>

      <div id="hintsBlock" class="hints-block hidden">
        <h3>Підказки</h3>
        <div id="hintsContent"></div>
      </div>

    </div>
  </section>

</main>

<script src="time-utils.js"></script>
<script src="content-renderer.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pin = params.get("pin");

let hintsInterval = null;
let currentAnswers = [];
let currentFoundAnswers = [];
let currentTeamName = "";
let currentTask = null;
let currentOlympiad = null;
let currentMultitask = null;
let currentGameWinnerType = "TIME";
let currentGameType = "LINEAR";
let currentStorm = null;
let selectedStormTaskId = null;
let selectedStormBriefing = false;
let stormTimerInterval = null;
let waitingStartInterval = null;
const stormAutoTransitionInFlight = new Set();

function isScoreModeValue(value) {
  const type = String(value || "TIME").toUpperCase();
  return type === "SCORE" || type === "POINTS";
}
let olympiadTimerInterval = null;
let olympiadPurchaseReady = false;
let previousOlympiadPurchaseReady = null;

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function showOnly(screenId) {
  if (screenId !== "waitingScreen" && waitingStartInterval) {
    clearInterval(waitingStartInterval);
    waitingStartInterval = null;
  }

  document.getElementById("waitingScreen").classList.add("hidden");
  document.getElementById("noTasksScreen").classList.add("hidden");
  document.getElementById("finishedScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");

  document.getElementById(screenId).classList.remove("hidden");
}

function formatDateTime(value) {
  if (!value) return "";
  return QETime.formatLocalDateTime(value);
}

function formatSeconds(totalSeconds) {
  const seconds = Math.max(0, Number(totalSeconds) || 0);
  const minutesPart = Math.floor(seconds / 60);
  const secondsPart = seconds % 60;

  return `${String(minutesPart).padStart(2, "0")}:${String(secondsPart).padStart(2, "0")}`;
}

function parsePageBlocks(value) {
  if (!value) return [];

  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [{
      type: "TEXT",
      content: JSON.stringify({ text: String(value || "") })
    }];
  }
}

function renderPageContent(containerId, page) {
  const container = document.getElementById(containerId);
  const blocks = parsePageBlocks(page && page.content);

  container.innerHTML = blocks.length
    ? QEContentRenderer.renderBlocks(blocks)
    : "";

  QEContentRenderer.resizeHtmlFrames(container);
}

function getElapsedSecondsFromOpenedAt(openedAt) {
  if (!openedAt) return 0;

  const openedDate = QETime.parseUtcDate(openedAt);
  const now = new Date();

  if (!openedDate || Number.isNaN(openedDate.getTime())) return 0;

  return Math.floor((now.getTime() - openedDate.getTime()) / 1000);
}

async function loadGame() {
  const response = await fetch(`/api/play/${pin}`);
  const result = await response.json();

  if (!response.ok) {
    showOnly("waitingScreen");
    document.getElementById("waitingGameTitle").textContent =
      result.error || "Помилка";
    return;
  }

  if (result.status === "WAITING") {
    showOnly("waitingScreen");

    document.title = result.game?.run_title || result.page?.title || result.game?.game_title || "Гра";

    document.getElementById("waitingGameTitle").textContent =
      result.page?.title || "Брифінг";

    document.getElementById("waitingTeamName").textContent =
      `Команда: ${result.game.team_name}`;

    renderPageContent("waitingContent", result.page);

    startWaitingCountdown(result.game?.started_at);

    if (!document.getElementById("waitingContent").innerHTML.trim()) {
      document.getElementById("waitingContent").innerHTML =
        `<p>Гра почнеться: ${formatDateTime(result.game.started_at)}</p>`;
    }

    return;
  }

  if (result.status === "NO_TASKS") {
    showOnly("noTasksScreen");
    return;
  }

  if (result.status === "FINISHED" || result.status === "ARCHIVED") {
    showOnly("finishedScreen");
    document.getElementById("finishedTitle").textContent =
      result.page?.title || "Вітаємо! Ви завершили гру.";
    renderPageContent("finishedContent", result.page);
    return;
  }

  showOnly("gameScreen");

  currentGameWinnerType = result.game?.winner_type || "TIME";
  currentGameType = result.game?.game_type || "LINEAR";
  currentStorm = result.storm || null;

  document.title = result.game?.run_title || result.game?.game_title || "Гра";

  if (String(currentGameType || "LINEAR").toUpperCase() === "STORM" && currentStorm) {
    applyStormActiveTask(result);
  }

  currentTask = result.task;
  currentAnswers = result.answers || [];
  currentFoundAnswers = result.found_answers || [];
  currentOlympiad = result.olympiad || null;
  currentMultitask = result.multitask || null;
  currentTeamName = result.game.team_name || "";

  document.getElementById("teamNameDisplay").textContent = currentTeamName;
  document.getElementById("teamNameInput").value = currentTeamName;

  document.getElementById("gameTitle").textContent = "";

  renderStormShell(result);

  if (!result.task || !result.task.id) {
    selectedStormBriefing = true;
    setStormBriefingMode(true);
    renderStormTabs();
    return;
  }

  clearTaskView();
  showTaskContainers();

  const taskName = String(result.task.title || "").trim();
  document.getElementById("taskTitle").textContent =
    taskName ? `Завдання ${result.task.sort_order}. ${taskName}` : `Завдання ${result.task.sort_order}.`;

  renderContent(result.content || []);
  renderOlympiad();
  renderMultitask();
  renderFormat();
  renderHintsAndAutoTransition(result.hints || [], result.task);
}


function applyStormActiveTask(result) {
  const storm = result.storm;
  if (!storm || !Array.isArray(storm.tasks)) return;

  let active = selectedStormTaskId
    ? storm.tasks.find(item => Number(item.id) === Number(selectedStormTaskId) && item.available)
    : null;

  if (!active) {
    active = storm.tasks.find(item => Number(item.id) === Number(storm.active_task_id))
      || storm.tasks.find(item => item.available && !item.completed_at)
      || storm.tasks.find(item => item.available)
      || null;
  }

  if (!active || !active.task) return;

  selectedStormTaskId = active.id;
  result.task = active.task;
  result.content = active.content || [];
  result.hints = active.hints || [];
  result.answers = active.answers || [];
  result.found_answers = active.found_answers || [];
  result.olympiad = active.olympiad || null;
  result.multitask = active.multitask || null;
}

function renderStormShell(result) {
  const tabs = document.getElementById("stormTabs");
  const briefing = document.getElementById("stormBriefingBlock");
  const isStorm = String(result.game?.game_type || currentGameType || "LINEAR").toUpperCase() === "STORM" && currentStorm;

  if (!isStorm) {
    tabs.classList.add("hidden");
    briefing.classList.add("hidden");
    document.getElementById("stormHeaderTimer")?.classList.add("hidden");
    if (stormTimerInterval) clearInterval(stormTimerInterval);
    stormTimerInterval = null;
    return;
  }

  tabs.classList.remove("hidden");
  briefing.classList.remove("hidden");

  renderStormBriefing();
  if (!selectedStormTaskId && currentStorm?.active_task_id) selectedStormTaskId = currentStorm.active_task_id;
  if (!selectedStormBriefing) setStormBriefingMode(false);
  renderStormTabs();
  updateStormHeaderTimer();
  startStormTimers();
}

function renderStormBriefing() {
  const briefing = document.getElementById("stormBriefingBlock");
  const page = currentStorm?.briefing || null;
  const briefingHtml = (() => {
    const blocks = parsePageBlocks(page && page.content);
    if (!blocks.length) return `<p class="muted-text">Брифінг для цієї гри ще не заповнено.</p>`;
    return QEContentRenderer.renderBlocks(blocks);
  })();

  briefing.innerHTML = `
    <div class="storm-briefing-header">
      <strong>Брифінг</strong>
    </div>
    <div class="task-content">${briefingHtml}</div>
  `;

  QEContentRenderer.resizeHtmlFrames(briefing);
}

function clearTaskView() {
  const taskTitle = document.getElementById("taskTitle");
  const taskContent = document.getElementById("taskContent");
  const stormTaskAutoTimer = document.getElementById("stormTaskAutoTimer");
  const olympiadBlock = document.getElementById("olympiadBlock");
  const multitaskBlock = document.getElementById("multitaskBlock");
  const formatBlock = document.getElementById("formatBlock");
  const formatContent = document.getElementById("formatContent");
  const hintsBlock = document.getElementById("hintsBlock");
  const hintsContent = document.getElementById("hintsContent");

  if (hintsInterval) {
    clearInterval(hintsInterval);
    hintsInterval = null;
  }
  if (olympiadTimerInterval) {
    clearInterval(olympiadTimerInterval);
    olympiadTimerInterval = null;
  }

  if (taskTitle) {
    taskTitle.textContent = "";
    taskTitle.classList.add("hidden");
  }
  if (taskContent) {
    taskContent.innerHTML = "";
    taskContent.classList.add("hidden");
  }
  if (stormTaskAutoTimer) {
    stormTaskAutoTimer.innerHTML = "";
    stormTaskAutoTimer.classList.add("hidden");
  }
  if (olympiadBlock) {
    olympiadBlock.innerHTML = "";
    olympiadBlock.classList.add("hidden");
  }
  if (multitaskBlock) {
    multitaskBlock.innerHTML = "";
    multitaskBlock.classList.add("hidden");
  }
  if (formatContent) formatContent.innerHTML = "";
  if (formatBlock) formatBlock.classList.add("hidden");
  if (hintsContent) hintsContent.innerHTML = "";
  if (hintsBlock) hintsBlock.classList.add("hidden");
}

function shouldHideMainTaskContent() {
  const type = String(currentTask?.task_type || "").toUpperCase();
  return type === "OLYMPIAD" || type === "MULTITASK";
}

function showTaskContainers() {
  document.getElementById("taskTitle")?.classList.remove("hidden");

  const taskContent = document.getElementById("taskContent");
  if (!taskContent) return;

  if (shouldHideMainTaskContent()) {
    taskContent.innerHTML = "";
    taskContent.classList.add("hidden");
    return;
  }

  taskContent.classList.remove("hidden");
}

function calculateStormTaskAutoRemaining(task) {
  if (!task || task.completed_at || !task.opened_at) return null;
  const seconds = Number(task.task?.auto_transition_minutes ?? task.auto_transition_minutes) || 0;
  if (seconds <= 0) return null;
  const openedDate = QETime.parseUtcDate(task.opened_at);
  if (!openedDate || Number.isNaN(openedDate.getTime())) return null;
  return Math.max(0, Math.floor((openedDate.getTime() + seconds * 1000 - Date.now()) / 1000));
}

function getStormTaskAutoRemaining(task) {
  if (task && task._auto_remaining_seconds !== undefined && task._auto_remaining_seconds !== null) {
    return Math.max(0, Number(task._auto_remaining_seconds) || 0);
  }
  return calculateStormTaskAutoRemaining(task);
}

function getStormTaskTabTitle(task) {
  const taskName = String(task.title || "").trim() || `Завдання ${task.sort_order}`;
  const points = Number(task.points || task.score_points || task.completion_points || 0);
  const remaining = getStormTaskAutoRemaining(task);
  const timer = remaining !== null ? ` ${formatSeconds(remaining)}` : "";
  return `${task.sort_order}. ${taskName} (${points})${timer}`;
}

function getStormTaskItem(taskId) {
  return (currentStorm?.tasks || []).find(item => Number(item.id) === Number(taskId)) || null;
}

function setStormBriefingMode(isBriefing) {
  selectedStormBriefing = Boolean(isBriefing);
  const briefing = document.getElementById("stormBriefingBlock");

  if (selectedStormBriefing) {
    clearTaskView();
    briefing?.classList.remove("hidden");
    return;
  }

  briefing?.classList.add("hidden");
  showTaskContainers();
}

function renderStormTabs() {
  const tabs = document.getElementById("stormTabs");
  const tasks = currentStorm?.tasks || [];

  if (!tabs) return;

  const keepStormTabsOpen = tabs.classList.contains("is-open");
  tabs.classList.remove("is-open");

  const getTabButtonHtml = task => {
    const title = getStormTaskTabTitle(task);
    const active = !selectedStormBriefing && Number(task.id) === Number(selectedStormTaskId);
    const completed = Boolean(task.completed_at);
    const autoCompleted = Boolean(task.auto_transition);
    const locked = !task.available;
    const classes = ["storm-tab", active ? "active" : "", completed ? (autoCompleted ? "auto-completed" : "completed") : "", locked ? "locked" : ""].filter(Boolean).join(" ");
    const hint = locked ? (task.locked_message || "Завдання ще заблоковане") : "";
    const statusIcon = completed ? "✓ " : locked ? "🔒 " : "";

    return `
      <button type="button" class="${classes}" data-storm-task-id="${task.id}" ${locked ? "disabled" : ""} title="${escapeHtml(hint)}">
        <span class="storm-tab-main">${statusIcon}${escapeHtml(title)}</span>
        ${locked && hint ? `<span class="storm-tab-note">${escapeHtml(hint)}</span>` : ""}
      </button>
    `;
  };

  const taskButtonsHtml = tasks.map(getTabButtonHtml).join("");
  const activeTask = !selectedStormBriefing ? getStormTaskItem(selectedStormTaskId) : null;
  const activeTitle = selectedStormBriefing
    ? "Брифінг"
    : (activeTask ? getStormTaskTabTitle(activeTask) : "Оберіть завдання");
  const activeCompleted = activeTask ? Boolean(activeTask.completed_at) : false;
  const activeLocked = activeTask ? !activeTask.available : false;
  const activeIcon = activeCompleted ? "✓ " : activeLocked ? "🔒 " : "";

  tabs.innerHTML = `
    <div class="storm-tabs-mobile-head">
      <button type="button" class="mobile-tabs-toggle" aria-expanded="false" aria-label="Відкрити список завдань">☰</button>
      <button type="button" class="storm-tab storm-tab-mobile-active ${selectedStormBriefing ? "active" : ""}" aria-label="Поточна вкладка">
        <span class="storm-tab-main">${activeIcon}${escapeHtml(activeTitle)}</span>
      </button>
    </div>
    <div class="storm-tabs-menu">
      <button type="button" class="storm-tab storm-tab-briefing ${selectedStormBriefing ? "active" : ""}" data-storm-briefing-tab>
        <span class="storm-tab-main">Брифінг</span>
      </button>
      ${taskButtonsHtml}
    </div>
  `;

  if (keepStormTabsOpen && window.matchMedia("(max-width: 640px)").matches) {
    tabs.classList.add("is-open");
  }

  const mobileToggle = tabs.querySelector(".mobile-tabs-toggle");
  const closeStormTabsMenu = () => {
    tabs.classList.remove("is-open");
    mobileToggle?.setAttribute("aria-expanded", "false");
  };

  if (tabs.classList.contains("is-open")) {
    mobileToggle?.setAttribute("aria-expanded", "true");
  }

  if (window.__questEngineStormTabsOutsideHandler) {
    document.removeEventListener("pointerdown", window.__questEngineStormTabsOutsideHandler, true);
  }

  window.__questEngineStormTabsOutsideHandler = event => {
    const target = event.target;
    if (target instanceof Node && tabs.contains(target)) return;
    closeStormTabsMenu();
  };

  document.addEventListener("pointerdown", window.__questEngineStormTabsOutsideHandler, true);

  mobileToggle?.addEventListener("click", event => {
    event.preventDefault();
    event.stopPropagation();
    const isOpen = tabs.classList.toggle("is-open");
    mobileToggle.setAttribute("aria-expanded", String(isOpen));
  });

  tabs.querySelector(".storm-tab-mobile-active")?.addEventListener("click", event => {
    event.preventDefault();
    event.stopPropagation();
    const isOpen = tabs.classList.toggle("is-open");
    mobileToggle?.setAttribute("aria-expanded", String(isOpen));
  });

  tabs.querySelector("[data-storm-briefing-tab]")?.addEventListener("click", () => {
    closeStormTabsMenu();
    setStormBriefingMode(true);
    renderStormTabs();
  });

  tabs.querySelectorAll("[data-storm-task-id]").forEach(button => {
    button.addEventListener("click", () => {
      closeStormTabsMenu();
      const id = Number(button.dataset.stormTaskId);
      const task = (currentStorm.tasks || []).find(item => Number(item.id) === id && item.available);
      if (!task || !task.task) return;
      selectedStormBriefing = false;
      selectedStormTaskId = id;
      currentTask = task.task;
      currentAnswers = task.answers || [];
      currentFoundAnswers = task.found_answers || [];
      currentOlympiad = task.olympiad || null;
      currentMultitask = task.multitask || null;
      setStormBriefingMode(false);
      clearTaskView();
      showTaskContainers();
      const taskName = String(currentTask.title || "").trim();
      document.getElementById("taskTitle").textContent = taskName ? `Завдання ${currentTask.sort_order}. ${taskName}` : `Завдання ${currentTask.sort_order}.`;
      renderContent(task.content || []);
      renderOlympiad();
      renderMultitask();
      renderFormat();
      renderHintsAndAutoTransition(task.hints || [], currentTask);
      renderStormTabs();
    });
  });
}


function secondsUntil(value) {
  if (!value) return 0;
  const date = QETime.parseUtcDate(value);
  if (!date || Number.isNaN(date.getTime())) return 0;
  return Math.max(0, Math.floor((date.getTime() - Date.now()) / 1000));
}

function formatStormDuration(totalSeconds) {
  const seconds = Math.max(0, Number(totalSeconds) || 0);
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`
    : `${m}:${String(s).padStart(2, "0")}`;
}

function formatStormFinishDateTime(value) {
  const date = QETime.parseUtcDate(value);
  if (!date || Number.isNaN(date.getTime())) return "";
  const dd = String(date.getDate()).padStart(2, "0");
  const mm = String(date.getMonth() + 1).padStart(2, "0");
  const yyyy = date.getFullYear();
  const hh = String(date.getHours()).padStart(2, "0");
  const min = String(date.getMinutes()).padStart(2, "0");
  return `${dd}.${mm}.${yyyy} о ${hh}:${min}`;
}

function updateStormHeaderTimer() {
  const node = document.getElementById("stormHeaderTimer");
  if (!node) return;
  const finishAt = currentStorm?.run_finished_at || null;
  if (!finishAt) {
    node.classList.add("hidden");
    node.textContent = "";
    return;
  }
  const remaining = secondsUntil(finishAt);
  node.classList.remove("hidden");
  node.textContent = remaining < 86400
    ? `До завершення гри: ${formatStormDuration(remaining)}`
    : `Гра завершиться ${formatStormFinishDateTime(finishAt)}`;
  if (remaining <= 0) loadGame();
}

function startWaitingCountdown(startedAt) {
  const node = document.getElementById("waitingStartCountdown");
  if (waitingStartInterval) {
    clearInterval(waitingStartInterval);
    waitingStartInterval = null;
  }
  if (!node) return;

  if (!startedAt) {
    node.classList.add("hidden");
    node.textContent = "";
    return;
  }

  const update = () => {
    const remaining = secondsUntil(startedAt);
    if (remaining > 0) {
      node.classList.remove("hidden");
      node.textContent = `До старту гри залишилось: ${formatStormDuration(remaining)}`;
    } else {
      node.classList.add("hidden");
      node.textContent = "";
      clearInterval(waitingStartInterval);
      waitingStartInterval = null;
      loadGame();
    }
  };
  update();
  waitingStartInterval = setInterval(update, 1000);
}

function startStormTimers() {
  if (stormTimerInterval) clearInterval(stormTimerInterval);
  stormTimerInterval = setInterval(() => {
    updateStormHeaderTimer();

    let shouldReload = false;
    let expiredAutoTask = null;

    (currentStorm?.tasks || []).forEach(task => {
      if (!task.available && Number(task.remaining_seconds) > 0) {
        task.remaining_seconds = Math.max(0, Number(task.remaining_seconds) - 1);
        task.locked_message = task.remaining_seconds > 0
          ? `Відкриється через ${formatStormDuration(task.remaining_seconds)}`
          : task.locked_message;
        if (task.remaining_seconds <= 0) shouldReload = true;
      }

      if (task.available && !task.completed_at && Number(task.auto_transition_minutes) > 0) {
        const remaining = calculateStormTaskAutoRemaining(task);
        task._auto_remaining_seconds = remaining;
        if (remaining !== null && remaining <= 0 && !stormAutoTransitionInFlight.has(Number(task.id))) {
          expiredAutoTask = expiredAutoTask || task;
        }
      }
    });

    renderStormTabs();

    if (expiredAutoTask) {
      doAutoTransition(expiredAutoTask.id);
      return;
    }

    if (shouldReload) loadGame();
  }, 1000);
}

function renderContent(content) {
  const container = document.getElementById("taskContent");
  if (!container) return;

  if (shouldHideMainTaskContent() || !content.length) {
    container.innerHTML = "";
    container.classList.add("hidden");
    return;
  }

  container.classList.remove("hidden");
  container.innerHTML = QEContentRenderer.renderBlocks(content);
  QEContentRenderer.resizeHtmlFrames(container);
}


function parseOlympiadCellBlocks(value) {
  if (!value) return [];
  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [{
      type: "SECTION",
      content: JSON.stringify({
        columns: [
          {
            width: 100,
            blocks: [
              {
                type: "TEXT",
                content: JSON.stringify({
                  html: `<p>${escapeHtml(String(value || ""))}</p>`,
                  text: String(value || ""),
                  format: "tiptap"
                })
              }
            ]
          }
        ]
      })
    }];
  }
}

function olympiadCellHasContent(cell) {
  const contentValue = String(cell?.content || "").trim();
  if (!contentValue) return false;

  const blocks = parseOlympiadCellBlocks(contentValue);
  return Array.isArray(blocks) && blocks.length > 0;
}

function renderOlympiadCellContent(cell) {
  const contentValue = String(cell?.content || "").trim();
  if (!contentValue) return "";

  const blocks = parseOlympiadCellBlocks(contentValue);
  if (!blocks.length) return "";

  return QEContentRenderer.renderBlocks(blocks);
}

function formatOlympiadPurchaseLabel(value) {
  const amount = Math.max(0, Number(value) || 0);
  return isScoreModeValue(currentGameWinnerType)
    ? `Купити (-${amount} балів)`
    : `Купити (+${amount} сек)`;
}

function renderOlympiad() {
  const block = document.getElementById("olympiadBlock");

  if (!currentOlympiad || !currentOlympiad.settings || !Array.isArray(currentOlympiad.cells)) {
    block.classList.add("hidden");
    block.innerHTML = "";
    return;
  }

  block.classList.remove("hidden");

  const settings = currentOlympiad.settings;
  const cells = currentOlympiad.cells || [];
  const x = Number(settings.association_count) || 3;
  const l = Number(settings.level_count) || 4;
  const bottomRows = Math.pow(x, l - 1);
  const byLevel = new Map();

  cells.forEach(cell => {
    const level = Number(cell.level_number);
    if (!byLevel.has(level)) byLevel.set(level, []);
    byLevel.get(level).push(cell);
  });

  for (const list of byLevel.values()) {
    list.sort((a, b) => Number(a.cell_number) - Number(b.cell_number));
  }

  let html = `
    <h3>Олімпійка</h3>
    <div class="olympiad-table-wrap">
      <table class="olympiad-table">
        <tbody>
  `;

  for (let row = 0; row < bottomRows; row++) {
    html += "<tr>";

    for (let level = l; level >= 1; level--) {
      const count = Math.pow(x, level - 1);
      const rowSpan = bottomRows / count;

      if (row % rowSpan !== 0) continue;

      const index = Math.floor(row / rowSpan);
      const cell = (byLevel.get(level) || [])[index];
      if (!cell) continue;

      const isBottom = Number(cell.level_number) === l;
      const foundClass = cell.is_found ? "found" : "closed";
      const purchaseButton = (!cell.is_found && olympiadPurchaseReady)
        ? `<button type="button" class="olympiad-buy-btn" data-olympiad-buy-cell="${cell.cell_number}">${formatOlympiadPurchaseLabel(cell.purchase_value)}</button>`
        : "";

      let content = "";

      if (cell.is_found) {
        content = `<div class="olympiad-found-answer">${escapeHtml(cell.answer_text || "")}</div>`;
      } else if (isBottom) {
        const previewContent = renderOlympiadCellContent(cell);
        const previewBlock = previewContent
          ? `
            <div class="olympiad-scaled-preview" data-olympiad-preview="${cell.cell_number}" title="Натисніть для збільшення">
              <div class="olympiad-scaled-preview-inner">
                ${previewContent}
              </div>
            </div>
          `
          : "";
        content = `
          ${previewBlock}
          ${purchaseButton}
        `;
      } else {
        content = purchaseButton;
      }

      html += `
        <td rowspan="${rowSpan}" class="olympiad-cell ${foundClass} ${isBottom ? "bottom-level" : ""} olympiad-level-${level}">
          <div class="olympiad-cell-index">${cell.cell_number}</div>
          <div class="olympiad-cell-content">${content}</div>
        </td>
      `;
    }

    html += "</tr>";
  }

  html += `
        </tbody>
      </table>
    </div>

    <div id="olympiadPreviewModal" class="modal-backdrop hidden">
      <div class="modal-card olympiad-preview-modal-card">
        <div class="modal-header">
          <h3 id="olympiadPreviewModalTitle">Клітинка</h3>
          <button type="button" class="small-light-btn" id="closeOlympiadPreviewModalBtn">×</button>
        </div>
        <div id="olympiadPreviewModalContent" class="olympiad-full-preview-content"></div>
      </div>
    </div>
  `;

  block.innerHTML = html;

  block.querySelectorAll("[data-olympiad-preview]").forEach(preview => {
    preview.addEventListener("click", () => {
      if (preview.dataset.scaled !== "1") return;
      if (preview.dataset.scaled === "1") {
        openOlympiadPreviewModal(Number(preview.dataset.olympiadPreview));
      }
    });
  });

  block.querySelectorAll("[data-olympiad-buy-cell]").forEach(button => {
    button.addEventListener("click", event => {
      event.stopPropagation();
      buyOlympiadCell(Number(button.dataset.olympiadBuyCell));
    });
  });

  const closeBtn = document.getElementById("closeOlympiadPreviewModalBtn");
  if (closeBtn) closeBtn.addEventListener("click", closeOlympiadPreviewModal);

  const modal = document.getElementById("olympiadPreviewModal");
  if (modal) {
    modal.addEventListener("click", event => {
      if (event.target === modal) closeOlympiadPreviewModal();
    });
  }

  QEContentRenderer.resizeHtmlFrames(block);
  fitOlympiadPreviews();
  setTimeout(fitOlympiadPreviews, 0);
  setTimeout(fitOlympiadPreviews, 250);
  block.querySelectorAll(".olympiad-scaled-preview img, .olympiad-scaled-preview video, .olympiad-scaled-preview audio").forEach(media => {
    media.addEventListener("load", fitOlympiadPreviews, { once: true });
    media.addEventListener("loadedmetadata", fitOlympiadPreviews, { once: true });
  });
}

function fitOlympiadPreviews() {
  document.querySelectorAll(".olympiad-scaled-preview").forEach(preview => {
    const inner = preview.querySelector(".olympiad-scaled-preview-inner");
    if (!inner) return;

    inner.style.transform = "scale(1)";
    preview.style.width = "auto";
    preview.style.height = "auto";

    const maxWidth = window.innerWidth <= 720 ? 160 : 200;
    const maxHeight = window.innerWidth <= 720 ? 90 : 100;

    const width = Math.max(1, inner.scrollWidth || inner.offsetWidth || maxWidth);
    const height = Math.max(1, inner.scrollHeight || inner.offsetHeight || maxHeight);
    const scale = Math.min(1, maxWidth / width, maxHeight / height);

    inner.style.transform = `scale(${scale})`;
    preview.style.width = `${Math.ceil(width * scale)}px`;
    preview.style.height = `${Math.ceil(height * scale)}px`;
    const isScaled = scale < 0.995;
    preview.dataset.scaled = isScaled ? "1" : "0";
    preview.classList.toggle("is-clickable", isScaled);
    preview.title = isScaled ? "Натисніть для збільшення" : "";
  });
}

function openOlympiadPreviewModal(cellNumber) {
  const cell = (currentOlympiad?.cells || []).find(item => Number(item.cell_number) === Number(cellNumber));
  if (!cell) return;

  const modal = document.getElementById("olympiadPreviewModal");
  const title = document.getElementById("olympiadPreviewModalTitle");
  const content = document.getElementById("olympiadPreviewModalContent");

  if (!modal || !content || !title) return;

  title.textContent = `Клітинка №${cellNumber}`;
  const cellContent = cell.is_found
    ? `<div class="olympiad-found-answer full">${escapeHtml(cell.answer_text || "")}</div>`
    : renderOlympiadCellContent(cell);

  if (!cellContent.trim()) return;

  content.innerHTML = cellContent;
  modal.classList.remove("hidden");
  QEContentRenderer.resizeHtmlFrames(content);
}

function closeOlympiadPreviewModal() {
  const modal = document.getElementById("olympiadPreviewModal");
  if (modal) modal.classList.add("hidden");
}

async function buyOlympiadCell(cellNumber) {
  const cell = (currentOlympiad?.cells || []).find(item => Number(item.cell_number) === Number(cellNumber));
  const purchaseValue = Math.max(0, Number(cell?.purchase_value) || 0);

  const confirmed = confirm(`Купити код клітинки №${cellNumber}?\n\nКоманді буде нараховано штраф: ${isScoreModeValue(currentGameWinnerType) ? `-${purchaseValue} балів` : `+${purchaseValue} сек`}.`);
  if (!confirmed) return;

  const response = await fetch(`/api/play/${pin}/olympiad/cell/${cellNumber}/purchase`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ task_id: currentTask ? currentTask.id : null })
  });

  const result = await response.json();

  if (!response.ok) {
    showPlainAnswerMessage(result.error || "Помилка купівлі коду", "error");
    return;
  }

  showPlainAnswerMessage(result.message || "Код куплено", "success");

  if (Array.isArray(result.content)) {
    renderContent(result.content);
  }

  if (result.olympiad) {
    currentOlympiad = result.olympiad;
    renderOlympiad();
  }

  if (result.multitask) {
    currentMultitask = result.multitask;
    renderMultitask();
  }

  if (result.task_completed) {
    setTimeout(loadGame, 700);
  }
}

});


function parseMultitaskBlocks(value) {
  if (!value) return [];
  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [{
      type: "SECTION",
      content: JSON.stringify({
        columns: [
          {
            width: 100,
            blocks: [
              {
                type: "TEXT",
                content: JSON.stringify({
                  html: `<p>${escapeHtml(String(value || ""))}</p>`,
                  text: String(value || ""),
                  format: "tiptap"
                })
              }
            ]
          }
        ]
      })
    }];
  }
}

function renderMultitaskContent(value) {
  const blocks = parseMultitaskBlocks(value);
  if (!blocks.length) return "";
  return QEContentRenderer.renderBlocks(blocks);
}

function renderMultitaskSubtask(subtask) {
  if (subtask.is_visible === false) {
    return "";
  }

  if (subtask.is_found) {
    const comment = String(subtask.comment || "").trim();
    return `
      <div class="multitask-subtask-player done">
        <strong>${subtask.sort_order}. ${escapeHtml(subtask.answer_text || "")}</strong>
        ${comment ? `<span class="multitask-found-comment">— ${escapeHtml(comment)}</span>` : ""}
      </div>
    `;
  }

  return `
    <div class="multitask-subtask-player">
      <div class="multitask-subtask-number">${subtask.sort_order}</div>
      <div class="multitask-subtask-content">${renderMultitaskContent(subtask.content || "")}</div>
      ${description ? `<div class="multitask-answer-format">Формат відповіді: ${escapeHtml(description)}</div>` : ""}
      ${renderMultitaskHint(subtask)}
    </div>
  `;
}

function renderMultitaskHint(subtask) {
  const hintType = subtask.hint_type || "NONE";
  const hintText = String(subtask.hint_text || "").trim();
  if (hintType === "NONE" || !hintText) return "";

  const elapsed = getElapsedSecondsFromOpenedAt(currentTask?.opened_at);

  if (hintType === "TIMED") {
    const after = Number(subtask.hint_after_seconds) || 0;
    if (elapsed >= after) {
      return `<div class="multitask-hint-text"><strong>Підказка:</strong> ${escapeHtml(hintText)}</div>`;
    }
    return `<div class="multitask-hint-wait">Підказка зʼявиться через: ${formatSeconds(after - elapsed)}</div>`;
  }

  if (hintType === "PAID") {
    if (subtask.hint_purchased) {
      return `<div class="multitask-hint-text"><strong>Підказка:</strong> ${escapeHtml(hintText)}</div>`;
    }
    const after = Number(subtask.hint_purchase_after_seconds) || 0;
    const price = Math.max(0, Number(subtask.hint_purchase_value) || 0);
    if (elapsed >= after) {
      return `<button type="button" class="multitask-buy-hint-btn" data-multitask-buy-hint="${subtask.id}">Купити підказку (${isScoreModeValue(currentGameWinnerType) ? `-${price} балів` : `+${price} сек`})</button>`;
    }
    return `<div class="multitask-hint-wait">Можливість купити підказку зʼявиться через: ${formatSeconds(after - elapsed)}</div>`;
  }

  return "";
}

function renderFormat() {
  const block = document.getElementById("formatBlock");

    return;
  }

  block.classList.remove("hidden");

  const main = currentAnswers.filter(a => a.answer_type === "MAIN");
  const bonus = currentAnswers.filter(a => a.answer_type === "BONUS");
  const penalty = currentAnswers.filter(a => a.answer_type === "PENALTY");

function formatAnswerLine(label, answer) {
  const found = currentFoundAnswers.find(item =>
    Number(item.task_answer_id || item.id) === Number(answer.id)
  );

  if (found) {
    const comment = String(found.comment || answer.comment || "").trim();
    const code = found.answer_text || "";

    const cssClass =
      answer.answer_type === "PENALTY"
        ? "accepted-penalty-answer"
        : "accepted-answer";

    return `
      <p class="${cssClass}">
        <strong>${escapeHtml(label)}:</strong>
        ${escapeHtml(code)}
        ${comment ? ` - ${escapeHtml(comment)}` : ""}
      </p>
    `;
  }

  const description = String(answer.description || "").trim();

  if (!description) {
    return `<p>${escapeHtml(label)}</p>`;
  }

  return `<p>${escapeHtml(label)}: ${escapeHtml(description)}</p>`;
}

function renderHintsAndAutoTransition(hints, task) {
  const block = document.getElementById("hintsBlock");
  const container = document.getElementById("hintsContent");

  if (hintsInterval) {
    clearInterval(hintsInterval);
    hintsInterval = null;
  }

  if (olympiadTimerInterval) {
    clearInterval(olympiadTimerInterval);
    olympiadTimerInterval = null;
  }

  previousOlympiadPurchaseReady = null;

  if (task && task.task_type === "MULTITASK" && currentMultitask) {
    block.classList.add("hidden");
    container.innerHTML = "";

    hintsInterval = setInterval(() => {
      renderMultitask();
    }, 1000);

    return;
  }

  if (task && task.task_type === "OLYMPIAD" && currentOlympiad?.settings) {
    block.classList.remove("hidden");

    const purchaseAfter = Number(currentOlympiad.settings.purchase_available_after_seconds || 0);

    const updateOlympiadPurchaseTimer = () => {
      const elapsed = getElapsedSecondsFromOpenedAt(task.opened_at);
      const remaining = Math.max(0, purchaseAfter - elapsed);
      olympiadPurchaseReady = remaining <= 0;

      if (olympiadPurchaseReady) {
        container.innerHTML = `
          <div class="hint-timer olympiad-purchase-ready">
            Купівля кодів уже доступна. Натисніть «Купити» у потрібній клітинці.
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="hint-timer olympiad-purchase-timer">
            Можливість купити коди зʼявиться через:
            <strong>${formatSeconds(remaining)}</strong>
          </div>
        `;
      }

      const shouldRerenderOlympiad = previousOlympiadPurchaseReady !== olympiadPurchaseReady;
      previousOlympiadPurchaseReady = olympiadPurchaseReady;

      if (shouldRerenderOlympiad) {
        renderOlympiad();
      }

      if (remaining <= 0 && olympiadTimerInterval) {
        clearInterval(olympiadTimerInterval);
        olympiadTimerInterval = null;
      }
    };

    updateOlympiadPurchaseTimer();
    if (!olympiadPurchaseReady) {
      olympiadTimerInterval = setInterval(updateOlympiadPurchaseTimer, 1000);
    }

    return;
  }

  const hasHints = hints.some(h => String(h.hint_type || "TIMED").toUpperCase() !== "NONE");
  const taskAlreadyCompleted = Boolean(task.completed_at);
  const hasAutoTransition =
    !taskAlreadyCompleted && Number(task.auto_transition_minutes) > 0;

  block.classList.remove("hidden");

  const elapsedSeconds = getElapsedSecondsFromOpenedAt(task.opened_at);

  const hintsState = hints.map(hint => {
    const hintType = String(hint.hint_type || "TIMED").toUpperCase();
    const delay = hintType === "PAID"
      ? Number(hint.purchase_after_seconds || 0)
      : Number(hint.show_after_seconds || 0);

    return {
      id: hint.id,
      sort_order: hint.sort_order,
      content: hint.content || "",
      hint_type: hintType,
      purchase_value: Number(hint.purchase_value) || 0,
      purchased: Boolean(hint.purchased_at),
      remaining: Math.max(0, delay - elapsedSeconds)
    };
  }).filter(hint => hint.hint_type !== "NONE");

  const stormAutoItem = String(currentGameType || "LINEAR").toUpperCase() === "STORM"
    ? (getStormTaskItem(task.id) || task)
    : null;

  const autoState = hasAutoTransition
    ? {
        task_id: task.id,
        remaining: stormAutoItem
          ? (getStormTaskAutoRemaining(stormAutoItem) ?? 0)
          : Math.max(0, Number(task.auto_transition_minutes || 0) - elapsedSeconds),
        triggered: false
      }
    : null;

  if (autoState && autoState.remaining <= 0 && !autoState.triggered) {
    autoState.triggered = true;
    doAutoTransition();
    return;
  }

  renderHintsAndAutoState(hintsState, autoState, hasHints, hasAutoTransition);

  hintsInterval = setInterval(() => {
    hintsState.forEach(hint => {
      if (hint.remaining > 0) {
        hint.remaining -= 1;
      }
    });

    if (autoState) {
      const stormItem = String(currentGameType || "LINEAR").toUpperCase() === "STORM"
        ? (getStormTaskItem(autoState.task_id) || task)
        : null;
      autoState.remaining = stormItem
        ? (calculateStormTaskAutoRemaining(stormItem) ?? 0)
        : Math.max(0, autoState.remaining - 1);
      if (stormItem) {
        stormItem._auto_remaining_seconds = autoState.remaining;
        renderStormTabs();
      }
    }

    renderHintsAndAutoState(hintsState, autoState, hasHints, hasAutoTransition);

    if (autoState && autoState.remaining <= 0 && !autoState.triggered) {
      autoState.triggered = true;
      doAutoTransition();
      return;
    }

    const allHintsOpened = hintsState.every(hint => hint.remaining <= 0);
    const autoFinished = !autoState || autoState.remaining <= 0;

    if (allHintsOpened && autoFinished) {
      clearInterval(hintsInterval);
      hintsInterval = null;
    }
  }, 1000);
}

function renderHintsAndAutoState(hintsState, autoState, hasHints, hasAutoTransition) {
  const container = document.getElementById("hintsContent");
  const isStorm = String(currentGameType || "LINEAR").toUpperCase() === "STORM";

  let hintsHtml = "";

  if (!hasHints) {
    hintsHtml += `
      <div class="hint-timer">
        Підказки у цьому завданні не передбачені.
      </div>
    `;
  } else {
    hintsHtml += hintsState.map(hint => {
      if (hint.hint_type === "PAID") {
        if (hint.purchased) {
          return `
            <div class="hint">
              <strong>Підказка №${hint.sort_order}:</strong>
              <p>${escapeHtml(hint.content).replaceAll("\\n", "<br>")}</p>
            </div>
          `;
        }

        if (hint.remaining > 0) {
          return `
            <div class="hint-timer">
              Кнопка купівлі підказки №${hint.sort_order} зʼявиться через:
              <strong>${formatSeconds(hint.remaining)}</strong>
            </div>
          `;
        }

        const unit = isScoreModeValue(currentGameWinnerType) ? "балів" : "сек";
        return `
          <div class="hint-timer">
            <button type="button" data-buy-standard-hint="${hint.id}">
              Купити підказку №${hint.sort_order} за ${hint.purchase_value} ${unit}
            </button>
          </div>
        `;
      }

      if (hint.remaining > 0) {
        return `
          <div class="hint-timer">
            До підказки №${hint.sort_order} залишилось:
            <strong>${formatSeconds(hint.remaining)}</strong>
          </div>
        `;
      }

      return `
        <div class="hint">
          <strong>Підказка №${hint.sort_order}:</strong>
          <p>${escapeHtml(hint.content).replaceAll("\\n", "<br>")}</p>
        </div>
      `;
    }).join("");
  }

  let autoHtml = "";

  if (hasAutoTransition) {
    const text = isStorm ? "До блокування завдання залишилось:" : "До автопереходу залишилось:";
    autoHtml = `
      <div class="hint-timer auto-transition-timer">
        ${text}
        <strong>${formatSeconds(autoState.remaining)}</strong>
      </div>
    `;
  } else if (!isStorm) {
    autoHtml = `
      <div class="hint-timer">
        Автоперехід у цьому завданні не передбачений.
      </div>
    `;
  }

  if (isStorm) {
    const topTimer = document.getElementById("stormTaskAutoTimer");
    if (topTimer) {
      topTimer.innerHTML = autoHtml;
      topTimer.classList.toggle("hidden", !autoHtml || selectedStormBriefing);
    }
    container.innerHTML = hintsHtml;
  } else {
    document.getElementById("stormTaskAutoTimer")?.classList.add("hidden");
    container.innerHTML = hintsHtml + autoHtml;
  }

  container.querySelectorAll('[data-buy-standard-hint]').forEach(button => {
    button.addEventListener('click', () => buyStandardHint(Number(button.dataset.buyStandardHint)));
  });
}
async function buyStandardHint(hintId) {
  const response = await fetch(`/api/play/${pin}/hint/${hintId}/purchase`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ task_id: currentTask ? currentTask.id : null })
  });

  const result = await response.json();
  if (!response.ok) {
    showPlainAnswerMessage(result.error || "Помилка купівлі підказки", "error");
    return;
  }

  showPlainAnswerMessage(result.message || "Підказку куплено", "success");
  if (Array.isArray(result.hints)) {
    renderHintsAndAutoTransition(result.hints, currentTask);
  } else {
    loadGame();
  }
}

async function doAutoTransition(taskIdOverride = null) {
  const isStorm = String(currentGameType || "LINEAR").toUpperCase() === "STORM";
  const targetTaskId = Number(taskIdOverride || (currentTask ? currentTask.id : 0));
  if (isStorm && targetTaskId && stormAutoTransitionInFlight.has(targetTaskId)) return;
  if (isStorm && targetTaskId) stormAutoTransitionInFlight.add(targetTaskId);
  showPlainAnswerMessage(isStorm ? "Час вийшов. Завдання блокується..." : "Час вийшов. Переходимо далі...", "neutral");

  const response = await fetch(`/api/play/${pin}/auto-transition`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      task_id: targetTaskId || (currentTask ? currentTask.id : null)
    })
  });

  const result = await response.json();

  if (!response.ok) {
    if (isStorm && targetTaskId) stormAutoTransitionInFlight.delete(targetTaskId);
    showPlainAnswerMessage(result.error || "Помилка автопереходу", "error");
    return;
  }

  showPlainAnswerMessage(result.message || (isStorm ? "Завдання заблоковано" : "Автоперехід виконано"), "neutral");

  if (result.storm) {
    if (isStorm && targetTaskId) stormAutoTransitionInFlight.delete(targetTaskId);
    currentStorm = result.storm;
    renderStormTabs();

    const selectedItem = getStormTaskItem(selectedStormTaskId || currentTask?.id);
    if (!selectedItem || selectedItem.completed_at || !selectedItem.task) {
      loadGame();
      return;
    }

    currentTask = selectedItem.task || currentTask;
    currentAnswers = selectedItem.answers || [];
    currentFoundAnswers = selectedItem.found_answers || [];
    currentOlympiad = selectedItem.olympiad || null;
    currentMultitask = selectedItem.multitask || null;
    clearTaskView();
    showTaskContainers();
    const taskName = String(currentTask.title || "").trim();
    document.getElementById("taskTitle").textContent = taskName ? `Завдання ${currentTask.sort_order}. ${taskName}` : `Завдання ${currentTask.sort_order}.`;
    renderContent(selectedItem.content || []);
    renderOlympiad();
    renderMultitask();
    renderFormat();
    renderHintsAndAutoTransition(selectedItem.hints || [], currentTask);
    return;
  }

  setTimeout(() => {
    window.location.reload();
  }, 1200);
}

function renderCodeMessages(results) {

  return results.map(item => {

    let cssClass = "";

    if (item.status === "accepted") {
      cssClass = "answer-success";
    }
    else if (item.status === "repeated") {
      cssClass = "answer-repeat";
    }
    else {
      cssClass = "answer-error";
    }

    return `
      <span class="${cssClass}">
        ${escapeHtml(item.message)}
      </span>
    `;

  }).join(", ");
}

function showAnswerMessage(html) {
  const message = document.getElementById("answerMessage");

  message.innerHTML = html;

  setTimeout(() => {
    message.innerHTML = "";
  }, 3000);
}

function showPlainAnswerMessage(text, type) {
  const cssClass =
    type === "success"
      ? "answer-success"
      : type === "error"
        ? "answer-error"
        : "answer-repeat";

  showAnswerMessage(`
    <span class="${cssClass}">
      ${escapeHtml(text)}
    </span>
  `);
}

function showTeamNameMessage(text, type) {
  const message = document.getElementById("teamNameMessage");

  message.textContent = text;

  if (type === "success") {
    message.style.color = "#22c55e";
  } else {
    message.style.color = "#ef4444";
  }

  setTimeout(() => {
    message.textContent = "";
  }, 3000);
}

async function submitAnswer() {
  const input = document.getElementById("answerInput");
  const answer = input.value.trim();

  if (!answer) {
    showPlainAnswerMessage("Введіть код", "error");
    return;
  }

  const response = await fetch(`/api/play/${pin}/answer`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      answer,
      task_id: String(currentGameType || "LINEAR").toUpperCase() === "STORM" && currentTask ? currentTask.id : null
    })
  });

  const result = await response.json();

  if (!response.ok) {
    showPlainAnswerMessage(result.error || "Помилка", "error");
    return;
  }

  if (Array.isArray(result.results)) {
    showAnswerMessage(
      renderCodeMessages(result.results)
    );
  } else if (!result.accepted) {
    showPlainAnswerMessage(`Код ${answer.toUpperCase()} не прийнято`, "error");
    return;
  }

  input.value = "";

  if (result.storm) {
    currentStorm = result.storm;
    renderStormShell({ game: { game_type: currentGameType }, storm: currentStorm, task: currentTask });

    const selectedItem = getStormTaskItem(selectedStormTaskId || currentTask?.id);
    if (selectedItem) {
      if (Array.isArray(result.content)) selectedItem.content = result.content;
      if (result.multitask) selectedItem.multitask = result.multitask;
      if (result.olympiad) selectedItem.olympiad = result.olympiad;
      currentTask = selectedItem.task || currentTask;
    }
  }

  if (Array.isArray(result.content)) {
    renderContent(result.content);
  }

  if (Array.isArray(result.found_items)) {
    result.found_items.forEach(foundItem => {
      const alreadyExists = currentFoundAnswers.some(item =>
        Number(item.task_answer_id || item.id) === Number(foundItem.id)
      );

      if (!alreadyExists) {
        currentFoundAnswers.push({
          task_answer_id: foundItem.id,
          answer_text: foundItem.answer_text,
          answer_type: foundItem.answer_type,
          description: foundItem.description,
          comment: foundItem.comment,
          sort_order: foundItem.sort_order,
          time_modifier_seconds: foundItem.time_modifier_seconds
        });
      }
    });

    if (result.olympiad) { currentOlympiad = result.olympiad; renderOlympiad(); }
    renderFormat();
  } else if (result.found) {
    currentFoundAnswers.push({
      task_answer_id: result.found.id,
      answer_text: result.found.answer_text,
      answer_type: result.found.answer_type,
      description: result.found.description,
      comment: result.found.comment,
      sort_order: result.found.sort_order,
      time_modifier_seconds: result.found.time_modifier_seconds
    });

    if (result.olympiad) { currentOlympiad = result.olympiad; renderOlympiad(); }
    renderFormat();
  }

  if (result.olympiad) {
    currentOlympiad = result.olympiad;
    renderOlympiad();
  }

  if (result.multitask) {
    currentMultitask = result.multitask;
    renderMultitask();
  }

  if (result.task_completed) {
    showPlainAnswerMessage(result.message, "success");

    setTimeout(() => {
      loadGame();
    }, 1200);
  }
}

function openTeamNameEdit() {
  document.getElementById("teamNameInput").value = currentTeamName;
  document.getElementById("teamNameEditBlock").classList.remove("hidden");
  document.getElementById("teamNameInput").focus();
}

function closeTeamNameEdit() {
  document.getElementById("teamNameEditBlock").classList.add("hidden");
  document.getElementById("teamNameMessage").textContent = "";
}

async function saveTeamName() {
  const input = document.getElementById("teamNameInput");
  const name = input.value.trim();

  if (!name) {
    showTeamNameMessage("Введіть назву команди", "error");
    return;
  }

  const response = await fetch(`/api/play/${pin}/team-name`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  });

  const result = await response.json();

  if (!response.ok) {
    showTeamNameMessage(result.error || "Помилка", "error");
    return;
  }

  currentTeamName = result.team_name;
  document.getElementById("teamNameDisplay").textContent = currentTeamName;
  document.getElementById("teamNameInput").value = currentTeamName;

  showTeamNameMessage("✓ Назву команди збережено", "success");

  setTimeout(() => {
    closeTeamNameEdit();
  }, 700);
}

document.getElementById("submitAnswerBtn").addEventListener("click", submitAnswer);

document.getElementById("answerInput").addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    document.getElementById("submitAnswerBtn").click();
  }
});

document.getElementById("editTeamNameBtn").addEventListener("click", openTeamNameEdit);
document.getElementById("cancelTeamNameBtn").addEventListener("click", closeTeamNameEdit);
document.getElementById("saveTeamNameBtn").addEventListener("click", saveTeamName);

document.getElementById("teamNameInput").addEventListener("keydown", (event) => {
  if (event.key === "Enter") {
    saveTeamName();
  }

  if (event.key === "Escape") {
    closeTeamNameEdit();
  }
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    loadGame();
  }
});

window.addEventListener("focus", () => {
  loadGame();
});

loadGame();
</script>
