<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статистика гри</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app public-statistics-page">
  <div class="card public-statistics-card">

    <h1 id="publicStatisticsTitle">Статистика гри</h1>

    <div id="publicStatisticsMeta" class="public-statistics-meta">
      Завантаження статистики...
    </div>

    <div id="publicStatisticsBlock">
      Завантаження таблиці...
    </div>

  </div>
</div>

<script src="time-utils.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const runCode = String(params.get("run") || "").trim().toUpperCase();
let currentStatistics = null;
let currentMode = "detailed";

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function formatDuration(totalSeconds) {
  if (totalSeconds === null || totalSeconds === undefined) {
    return "-";
  }

  const seconds = Math.max(0, Number(totalSeconds) || 0);
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const sec = seconds % 60;

  return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
}

function formatDateTimeAsSaved(value) {
  return QETime.formatLocalDateTime(value);
}

function getTeamBonusSeconds(team) {
  return Number(team.total_bonus_seconds) || 0;
}

function getTeamPenaltySeconds(team) {
  return Number(team.total_penalty_seconds) || 0;
}

function getFullTimeSeconds(team) {
  return team.full_time_seconds === null || team.full_time_seconds === undefined
    ? null
    : Number(team.full_time_seconds);
}

function getGameTimeSeconds(team) {
  const fullTime = getFullTimeSeconds(team);

  if (fullTime === null) {
    return null;
  }

  const bonus = getTeamBonusSeconds(team);
  const penalty = getTeamPenaltySeconds(team);

  return Math.max(0, fullTime - bonus + penalty);
}

function isScoreMode() {
  const type = String(currentStatistics?.run?.winner_type || "TIME").toUpperCase();
  return type === "SCORE" || type === "POINTS";
}

function getTeamScore(team) {
  return Number(team.score_total) || 0;
}

function getTeamScoreReachedAt(team) {
  return team.score_reached_at || team.finished_at || team.calculated_finished_at || team.created_at || "";
}


function getScoreEventsForTask(team, taskId) {
  return (team.score_events || []).filter(event => Number(event.task_id) === Number(taskId));
}

function getTeamScoreGameTimeSeconds(team) {
  const start = team.started_at || team.created_at;
  const end = getTeamScoreReachedAt(team);
  if (!start || !end) return null;
  const startDate = new Date(String(start).replace(" ", "T") + "Z");
  const endDate = new Date(String(end).replace(" ", "T") + "Z");
  if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) return null;
  return Math.max(0, Math.floor((endDate.getTime() - startDate.getTime()) / 1000));
}

function formatScoreNumber(value) {
  const number = Number(value) || 0;
  if (number > 0) return `<span class="stat-bonus">+${number}</span>`;
  if (number < 0) return `<span class="stat-penalty">-${Math.abs(number)}</span>`;
  return "0";
}

function formatScoreTaskCell(team, task) {
  const events = getScoreEventsForTask(team, task.id);
  if (!task.opened_at && !events.length) return `<div class="stat-empty">-</div>`;
  const sum = events.reduce((total, event) => total + (Number(event.points) || 0), 0);
  const lastEvent = events.length ? events[events.length - 1] : null;
  const finish = lastEvent?.created_at || task.completed_at || null;
  if (!finish && task.opened_at) return `<div class="task-main-time in-progress-text">в процесі</div><div class="task-time-details">(${escapeHtml(QETime.formatLocalTime(task.opened_at))} — -)</div>`;
  return `<div class="task-main-time">${formatScoreNumber(sum)}</div><div class="task-time-details">(${escapeHtml(QETime.formatLocalTime(task.opened_at))} — ${escapeHtml(QETime.formatLocalTime(finish))})</div>`;
}

function formatScoreAdjustments(team) {
  const events = (team.score_events || []).filter(event => event.event_type !== "TASK_COMPLETE");
  const sum = events.reduce((total, event) => total + (Number(event.points) || 0), 0);
  if (!events.length || sum === 0) return "-";
  return `<div>${formatScoreNumber(sum)}</div>`;
}

function formatTaskCell(task) {
  if (!task.cell || task.cell.status === "not_started") {
    return `<div class="stat-empty">-</div>`;
  }

  if (task.cell.status === "in_progress") {
    return `<div class="task-main-time in-progress-text">в процесі</div>`;
  }

  return `
    <div class="task-main-time">
      ${escapeHtml(formatDuration(task.cell.duration_seconds))}
    </div>
  `;
}

function formatBonusPenalty(team) {
  const bonus = getTeamBonusSeconds(team);
  const penalty = getTeamPenaltySeconds(team);

  if (!bonus && !penalty) {
    return "-";
  }

  const total = penalty - bonus;
  const totalClass = total <= 0 ? "stat-bonus" : "stat-penalty";
  const totalSign = total <= 0 ? "-" : "+";
  const details = [];

  if (bonus) {
    details.push(`<span class="stat-bonus-small">-${formatDuration(bonus)}</span>`);
  }

  if (penalty) {
    details.push(`<span class="stat-penalty-small">+${formatDuration(penalty)}</span>`);
  }

  return `
    <div class="${totalClass}">
      ${totalSign}${formatDuration(Math.abs(total))}
    </div>
    <div class="bonus-penalty-details">
      (${details.join(", ")})
    </div>
  `;
}

function prepareRanking(teams) {
  if (isScoreMode()) {
    const ranked = [...teams].sort((a, b) => {
      const scoreDiff = getTeamScore(b) - getTeamScore(a);
      if (scoreDiff !== 0) return scoreDiff;
      const timeA = getTeamScoreGameTimeSeconds(a);
      const timeB = getTeamScoreGameTimeSeconds(b);
      if (timeA !== null && timeB !== null && timeA !== timeB) return timeA - timeB;
      return String(getTeamScoreReachedAt(a)).localeCompare(String(getTeamScoreReachedAt(b)));
    });

    ranked.forEach((team, index) => {
      team.place = index + 1;
      if (index === 0) {
        team.gap_from_previous_score = null;
        team.gap_from_first_score = null;
      } else {
        team.gap_from_previous_score = getTeamScore(team) - getTeamScore(ranked[index - 1]);
        team.gap_from_first_score = getTeamScore(team) - getTeamScore(ranked[0]);
      }
    });

    return ranked;
  }

  const finishedTeams = teams
    .filter(team => getGameTimeSeconds(team) !== null)
    .sort((a, b) => getGameTimeSeconds(a) - getGameTimeSeconds(b));

  finishedTeams.forEach((team, index) => {
    team.place = index + 1;

    if (index === 0) {
      team.gap_from_previous_seconds = null;
      team.gap_from_first_seconds = null;
      return;
    }

    const previous = finishedTeams[index - 1];
    const first = finishedTeams[0];

    team.gap_from_previous_seconds = getGameTimeSeconds(team) - getGameTimeSeconds(previous);
    team.gap_from_first_seconds = getGameTimeSeconds(team) - getGameTimeSeconds(first);
  });

  const unfinishedTeams = teams
    .filter(team => getGameTimeSeconds(team) === null)
    .sort((a, b) => String(a.name || "").localeCompare(String(b.name || ""), "uk"));

  unfinishedTeams.forEach(team => {
    team.place = null;
    team.gap_from_previous_seconds = null;
    team.gap_from_first_seconds = null;
  });

  return [...finishedTeams, ...unfinishedTeams];
}

function renderModeButtons() {
  return `
    <div class="public-statistics-view-toggle" role="group" aria-label="Режим відображення статистики">
      <button type="button" class="toggle-btn ${currentMode === "detailed" ? "active" : ""}" data-mode="detailed">Детально</button>
      <button type="button" class="toggle-btn ${currentMode === "brief" ? "active" : ""}" data-mode="brief">Стисло</button>
    </div>
  `;
}


function renderScoreBriefTable(teams) {
  return `
    <div class="statistics-table-wrapper public-statistics-table-wrapper">
      <table class="statistics-table public-statistics-table public-statistics-brief-table">
        <thead>
          <tr>
            <th>Команда</th>
            <th>Ігровий час</th>
            <th>Кількість<br>балів</th>
            <th>Відставання від<br>попередньої</th>
            <th>Відставання від<br>першої</th>
            <th>Місце</th>
          </tr>
        </thead>
        <tbody>
          ${teams.map(team => `
            <tr>
              <td class="team-name-cell"><strong>${escapeHtml(team.name)}</strong></td>
              <td class="time-stat-cell main-time-cell">${getTeamScoreGameTimeSeconds(team) === null ? "-" : escapeHtml(formatDuration(getTeamScoreGameTimeSeconds(team)))}</td>
              <td class="time-stat-cell main-time-cell">${escapeHtml(String(getTeamScore(team)))} балів</td>
              <td>${team.gap_from_previous_score === null || team.gap_from_previous_score === undefined ? "-" : escapeHtml(String(team.gap_from_previous_score))}</td>
              <td>${team.gap_from_first_score === null || team.gap_from_first_score === undefined ? "-" : escapeHtml(String(team.gap_from_first_score))}</td>
              <td class="place-cell">${team.place ? `${team.place}` : "-"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderScoreTable(teams, tasks) {
  return `
    <div class="statistics-table-wrapper public-statistics-table-wrapper">
      <table class="statistics-table public-statistics-table">
        <thead>
          <tr>
            <th>Команда</th>
            <th>Час старту</th>
            ${tasks.map(task => `
              <th>
                Завдання ${task.sort_order}<br>
                <small>${escapeHtml(task.title || "")}</small>
              </th>
            `).join("")}
            <th>Час останнього<br>нарахування балів</th>
            <th>Ігровий час</th>
            <th>Кількість<br>балів</th>
            <th>Відставання від<br>попередньої</th>
            <th>Відставання від<br>першої</th>
            <th>Місце</th>
          </tr>
        </thead>
        <tbody>
          ${teams.map(team => `
            <tr>
              <td class="team-name-cell"><strong>${escapeHtml(team.name)}</strong></td>
              <td class="time-stat-cell">${escapeHtml(QETime.formatLocalTime(team.started_at))}</td>
              ${tasks.map(task => {
                const teamTask = (team.tasks || []).find(item => Number(item.id) === Number(task.id)) || task;
                return `<td class="time-stat-cell">${formatScoreTaskCell(team, teamTask)}</td>`;
              }).join("")}
              <td>${escapeHtml(QETime.formatLocalTime(getTeamScoreReachedAt(team)))}</td>
              <td class="time-stat-cell">${getTeamScoreGameTimeSeconds(team) === null ? "-" : escapeHtml(formatDuration(getTeamScoreGameTimeSeconds(team)))}</td>
              <td class="time-stat-cell main-time-cell">${escapeHtml(String(getTeamScore(team)))} балів</td>
              <td>${team.gap_from_previous_score === null || team.gap_from_previous_score === undefined ? "-" : escapeHtml(String(team.gap_from_previous_score))}</td>
              <td>${team.gap_from_first_score === null || team.gap_from_first_score === undefined ? "-" : escapeHtml(String(team.gap_from_first_score))}</td>
              <td class="place-cell">${team.place ? `${team.place}` : "-"}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderDetailedTable(teams, tasks) {
  return `
    <div class="statistics-table-wrapper public-statistics-table-wrapper">
      <table class="statistics-table public-statistics-table">
        <thead>
          <tr>
            <th>Команда</th>
            <th>Старт</th>

            ${tasks.map(task => `
              <th>
                Завдання ${task.sort_order}<br>
                <small>${escapeHtml(task.title)}</small>
              </th>
            `).join("")}

            <th>Від старту<br>до фінішу</th>
            <th>Ігровий час</th>
            <th>Відставання від<br>попередньої</th>
            <th>Відставання від<br>першої</th>
            <th>Місце</th>
          </tr>
        </thead>

        <tbody>
          ${teams.map(team => {
            const fullTime = getFullTimeSeconds(team);
            const gameTime = getGameTimeSeconds(team);

            return `
              <tr>
                <td class="team-name-cell"><strong>${escapeHtml(team.name)}</strong></td>

                <td class="time-stat-cell">${escapeHtml(QETime.formatLocalTime(team.started_at))}</td>

                ${(team.tasks || []).map(task => `
                  <td class="task-stat-cell ${escapeHtml(task.cell?.status || "not_started")}">
                    ${formatTaskCell(task)}
                  </td>
                `).join("")}

                <td class="time-stat-cell">${escapeHtml(formatDuration(fullTime))}</td>
                <td class="time-stat-cell">${formatBonusPenalty(team)}</td>
                <td class="time-stat-cell main-time-cell">${escapeHtml(formatDuration(gameTime))}</td>

                <td class="time-stat-cell">
                  ${team.gap_from_previous_seconds === null ? "-" : escapeHtml(formatDuration(team.gap_from_previous_seconds))}
                </td>

                <td class="time-stat-cell">
                  ${team.gap_from_first_seconds === null ? "-" : escapeHtml(formatDuration(team.gap_from_first_seconds))}
                </td>

                <td class="place-cell">${team.place ? `${team.place}` : "-"}</td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderBriefTable(teams) {
  return `
    <div class="statistics-table-wrapper public-statistics-table-wrapper">
      <table class="statistics-table public-statistics-table public-statistics-brief-table">
        <thead>
          <tr>
            <th>Команда</th>
            <th>Ігровий час</th>
            <th>Відставання від попередньої</th>
            <th>Відставання від першої</th>
            <th>Місце</th>
          </tr>
        </thead>

        <tbody>
          ${teams.map(team => {
            const gameTime = getGameTimeSeconds(team);

            return `
              <tr>
                <td class="team-name-cell"><strong>${escapeHtml(team.name)}</strong></td>
                <td class="time-stat-cell main-time-cell">${escapeHtml(formatDuration(gameTime))}</td>
                <td class="time-stat-cell">
                  ${team.gap_from_previous_seconds === null ? "-" : escapeHtml(formatDuration(team.gap_from_previous_seconds))}
                </td>
                <td class="time-stat-cell">
                  ${team.gap_from_first_seconds === null ? "-" : escapeHtml(formatDuration(team.gap_from_first_seconds))}
                </td>
                <td class="place-cell">${team.place ? `${team.place}` : "-"}</td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderPublicStatistics(statistics) {
  currentStatistics = statistics;

  const run = statistics.run || {};
  const teams = prepareRanking(statistics.teams || []);
  const tasks = teams[0]?.tasks || [];

  document.getElementById("publicStatisticsTitle").textContent =
    `Статистика «${run.title || "Запуск"}»`;

  document.getElementById("publicStatisticsMeta").innerHTML = `
    <div><strong>Гра:</strong> ${escapeHtml(run.game_title || "-")}</div>
    <div><strong>Старт:</strong> ${escapeHtml(formatDateTimeAsSaved(run.started_at))}</div>
  `;

  const block = document.getElementById("publicStatisticsBlock");

  if (!teams.length) {
    block.textContent = "У цьому запуску немає команд.";
    return;
  }

  if (isScoreMode()) {
    block.innerHTML = `
      ${renderModeButtons()}
      ${currentMode === "detailed" ? renderScoreTable(teams, tasks) : renderScoreBriefTable(teams)}
    `;

    block.querySelectorAll(".toggle-btn").forEach(button => {
      button.addEventListener("click", () => {
        currentMode = button.dataset.mode;
        renderPublicStatistics(currentStatistics);
      });
    });
    return;
  }

  block.innerHTML = `
    ${renderModeButtons()}
    ${currentMode === "detailed" ? renderDetailedTable(teams, tasks) : renderBriefTable(teams)}
  `;

  block.querySelectorAll(".toggle-btn").forEach(button => {
    button.addEventListener("click", () => {
      currentMode = button.dataset.mode;
      renderPublicStatistics(currentStatistics);
    });
  });
}

async function loadPublicStatistics() {
  const meta = document.getElementById("publicStatisticsMeta");
  const block = document.getElementById("publicStatisticsBlock");

  if (!runCode) {
    meta.textContent = "Не вказано код запуску.";
    block.textContent = "Відкрийте сторінку за посиланням, яке видає адміністратор після публікації статистики.";
    return;
  }

  try {
    const response = await fetch(
      `/api/statistics/public/run/${encodeURIComponent(runCode)}?t=${Date.now()}`
    );

    const result = await response.json();

    if (!response.ok) {
      meta.textContent = result.error || "Помилка завантаження статистики";
      block.textContent = "";
      return;
    }

    renderPublicStatistics(result);

  } catch (error) {
    console.error(error);
    meta.textContent = "Помилка з'єднання із сервером";
    block.textContent = "";
  }
}

loadPublicStatistics();
</script>

</body>
</html>
