<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новий пароль</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app auth-page">
    <section class="card auth-card">
      <a href="/login.html">← Назад до входу</a>
      <h1>Створити новий пароль</h1>
      <p>Введіть новий пароль для свого профілю.</p>

      <form id="resetPasswordForm">
        <input id="newPassword" type="password" placeholder="Новий пароль" autocomplete="new-password" required>
        <input id="repeatPassword" type="password" placeholder="Повторіть новий пароль" autocomplete="new-password" required>
        <button type="submit">Зберегти новий пароль</button>
      </form>

      <div id="message"></div>
    </section>
  </main>

  <script>
    const token = new URLSearchParams(window.location.search).get("token") || "";

    async function readJson(response) {
      try { return await response.json(); } catch (error) { return {}; }
    }

    if (!token) {
      document.getElementById("message").textContent = "Посилання для відновлення некоректне";
      document.getElementById("message").className = "error-message";
      document.getElementById("resetPasswordForm").classList.add("hidden");
    }

    document.getElementById("resetPasswordForm").addEventListener("submit", async event => {
      event.preventDefault();

      const response = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token,
          new_password: document.getElementById("newPassword").value,
          repeat_password: document.getElementById("repeatPassword").value
        })
      });

      const result = await readJson(response);
      const message = document.getElementById("message");
      message.textContent = result.error || result.message || "Запит оброблено";
      message.className = response.ok ? "success-message" : "error-message";

      if (response.ok) {
        document.getElementById("resetPasswordForm").reset();
      }
    });
  </script>
</body>
</html>
