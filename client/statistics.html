<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Адмін.статистика</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="card">

    <h1 id="statisticsTitle">Адмін.статистика</h1>

    <div id="publishStatisticsBlock" class="publish-statistics-block hidden">
      <button id="publishStatisticsBtn">
        Завершити гру і опублікувати
      </button>

      <span id="publishStatisticsMessage"></span>

      <div id="publicLinkBlock" class="hidden public-link-block">
        <div class="public-link-title">
          Публічне посилання на статистику
        </div>

        <div class="public-link-row">
          <a
            id="publicStatisticsLink"
            class="public-statistics-link"
            href="#"
            target="_blank"
            rel="noopener"
          ></a>

          <button id="copyPublicStatisticsLinkBtn" type="button">
            Копіювати
          </button>

          <span id="publicStatisticsCopyMessage" class="copy-success-message"></span>
        </div>
      </div>

      <div id="finishUnfinishedModal" class="modal-backdrop hidden">
        <div class="modal-card">
          <h3>Не всі команди завершили гру</h3>
          <p id="finishUnfinishedModalText"></p>
          <div class="modal-actions">
            <button type="button" id="cancelPublishBtn">Скасувати</button>
            <button type="button" id="forcePublishBtn" class="danger-btn">
              Усе одно завершити
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="statisticsBlock">
      Завантаження статистики...
    </div>

    <div id="detailsBlock" class="statistics-details hidden"></div>

  </div>
</div>

<script src="time-utils.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const runId = params.get("run");

let currentRun = null;
let currentTeams = [];
let currentTasks = [];
let selectedTeamIds = new Set();

function isRunArchived() {
  return currentRun?.status === "ARCHIVED";
}
let selectedCell = {
  teamId: null,
  taskId: null
};

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function formatDuration(totalSeconds) {
  if (totalSeconds === null || totalSeconds === undefined) {
    return "-";
  }

  const seconds = Math.max(0, Number(totalSeconds) || 0);

  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const sec = seconds % 60;

  return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
}

function getTeamBonusSeconds(team) {
  return Number(team.total_bonus_seconds) || 0;
}

function getTeamPenaltySeconds(team) {
  return Number(team.total_penalty_seconds) || 0;
}

function getFullTimeSeconds(team) {
  return team.full_time_seconds === null ||
    team.full_time_seconds === undefined
      ? null
      : Number(team.full_time_seconds);
}

function getGameTimeSeconds(team) {
  const fullTime = getFullTimeSeconds(team);

  if (fullTime === null) {
    return null;
  }

  const bonus = getTeamBonusSeconds(team);
  const penalty = getTeamPenaltySeconds(team);

  return Math.max(0, fullTime - bonus + penalty);
}

function isScoreMode() {
  const type = String(currentRun?.winner_type || "TIME").toUpperCase();
  return type === "SCORE" || type === "POINTS";
}

function getTeamScore(team) {
  return Number(team.score_total) || 0;
}

function getTeamScoreReachedAt(team) {
  return team.score_reached_at || team.finished_at || team.calculated_finished_at || team.created_at || "";
}


function getScoreEventsForTask(team, taskId) {
  return (team.score_events || []).filter(event => Number(event.task_id) === Number(taskId));
}


function getTeamScoreGameTimeSeconds(team) {
  const start = team.started_at || team.created_at;
  const end = getTeamScoreReachedAt(team);
  if (!start || !end) return null;
  const startDate = new Date(String(start).replace(" ", "T") + "Z");
  const endDate = new Date(String(end).replace(" ", "T") + "Z");
  if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) return null;
  return Math.max(0, Math.floor((endDate.getTime() - startDate.getTime()) / 1000));
}

function formatScoreNumber(value) {
  const number = Number(value) || 0;
  if (number > 0) return `<span class="stat-bonus">+${number}</span>`;
  if (number < 0) return `<span class="stat-penalty">-${Math.abs(number)}</span>`;
  return "0";
}

function formatScoreTaskCell(team, task) {
  const events = getScoreEventsForTask(team, task.id);
  if (!task.opened_at && !events.length) {
    return `<div class="stat-empty">-</div>`;
  }

  const sum = events.reduce((total, event) => total + (Number(event.points) || 0), 0);
  const lastEvent = events.length ? events[events.length - 1] : null;
  const finish = lastEvent?.created_at || task.completed_at || null;

  if (!finish && task.opened_at) {
    return `
      <div class="task-main-time in-progress-text">в процесі</div>
      <div class="task-time-details">(${escapeHtml(QETime.formatLocalTime(task.opened_at))} — -)</div>
    `;
  }

  return `
    <div class="task-main-time">${formatScoreNumber(sum)}</div>
    <div class="task-time-details">(${escapeHtml(QETime.formatLocalTime(task.opened_at))} — ${escapeHtml(QETime.formatLocalTime(finish))})</div>
  `;
}


function formatTaskCell(task) {
  if (!task.cell) {
    return `<div class="stat-empty">-</div>`;
  }

  if (task.cell.status === "not_started") {
    return `<div class="stat-empty">-</div>`;
  }

  if (task.cell.status === "in_progress") {
    return `
      <div class="task-main-time in-progress-text">в процесі</div>
      <div class="task-time-details">
        (${escapeHtml(QETime.formatLocalTime(task.opened_at))} — -)
      </div>
    `;
  }

  return `
    <div class="task-main-time">
      ${escapeHtml(formatDuration(task.cell.duration_seconds))}
    </div>
    <div class="task-time-details">
      (${escapeHtml(QETime.formatLocalTime(task.opened_at))} — ${escapeHtml(QETime.formatLocalTime(task.completed_at))})
    </div>
  `;
}

function formatBonusPenalty(team) {
  const bonus = getTeamBonusSeconds(team);
  const penalty = getTeamPenaltySeconds(team);

  if (!bonus && !penalty) {
    return "-";
  }

  const total = penalty - bonus;
  const totalClass = total <= 0 ? "stat-bonus" : "stat-penalty";
  const totalSign = total <= 0 ? "-" : "+";

  const details = [];

  if (bonus) {
    details.push(`<span class="stat-bonus-small">-${formatDuration(bonus)}</span>`);
  }

  if (penalty) {
    details.push(`<span class="stat-penalty-small">+${formatDuration(penalty)}</span>`);
  }

  return `
    <div class="${totalClass}">
      ${totalSign}${formatDuration(Math.abs(total))}
    </div>
    <div class="bonus-penalty-details">
      (${details.join(", ")})
    </div>
  `;
}

function prepareRanking(teams) {
  if (isScoreMode()) {
    const ranked = [...teams].sort((a, b) => {
      const scoreDiff = getTeamScore(b) - getTeamScore(a);
      if (scoreDiff !== 0) return scoreDiff;
      const timeA = getTeamScoreGameTimeSeconds(a);
      const timeB = getTeamScoreGameTimeSeconds(b);
      if (timeA !== null && timeB !== null && timeA !== timeB) return timeA - timeB;
      return String(getTeamScoreReachedAt(a)).localeCompare(String(getTeamScoreReachedAt(b)));
    });

    ranked.forEach((team, index) => {
      team.place = index + 1;
      if (index === 0) {
        team.gap_from_previous_score = null;
        team.gap_from_first_score = null;
      } else {
        team.gap_from_previous_score = getTeamScore(team) - getTeamScore(ranked[index - 1]);
        team.gap_from_first_score = getTeamScore(team) - getTeamScore(ranked[0]);
      }
    });

    return ranked;
  }

  const finishedTeams = teams
    .filter(team => getGameTimeSeconds(team) !== null)
    .sort((a, b) => getGameTimeSeconds(a) - getGameTimeSeconds(b));

  finishedTeams.forEach((team, index) => {
    team.place = index + 1;

    if (index === 0) {
      team.gap_from_previous_seconds = null;
      team.gap_from_first_seconds = null;
      return;
    }

    const previous = finishedTeams[index - 1];
    const first = finishedTeams[0];

    team.gap_from_previous_seconds =
      getGameTimeSeconds(team) - getGameTimeSeconds(previous);

    team.gap_from_first_seconds =
      getGameTimeSeconds(team) - getGameTimeSeconds(first);
  });

  teams.forEach(team => {
    if (getGameTimeSeconds(team) === null) {
      team.place = null;
      team.gap_from_previous_seconds = null;
      team.gap_from_first_seconds = null;
    }
  });

  return [
    ...finishedTeams,
    ...teams.filter(team => getGameTimeSeconds(team) === null)
  ];
}

function updateTitle(run) {
  const title = run?.title || "Запуск";
  const startedAt = QETime.formatLocalDateTime(run?.started_at);

  document.getElementById("statisticsTitle").textContent =
    `Адмін.статистика "${title}", ${startedAt}`;
}

function getUnfinishedTeams() {
  return currentTeams.filter(team =>
    getFullTimeSeconds(team) === null || !team.finished_at
  );
}

function hideFinishUnfinishedModal() {
  document
    .getElementById("finishUnfinishedModal")
    .classList.add("hidden");
}

function askFinishUnfinishedTeams(count) {
  return new Promise(resolve => {
    const modal = document.getElementById("finishUnfinishedModal");
    const text = document.getElementById("finishUnfinishedModalText");
    const cancelBtn = document.getElementById("cancelPublishBtn");
    const forceBtn = document.getElementById("forcePublishBtn");

    text.textContent = `Ще не завершили гру команд: ${count}. Якщо продовжити, ці команди будуть автоматично переведені на фініш із нарахуванням коригувань часу та можливих штрафів за автопереходи.`;

    const cleanup = value => {
      cancelBtn.onclick = null;
      forceBtn.onclick = null;
      hideFinishUnfinishedModal();
      resolve(value);
    };

    cancelBtn.onclick = () => cleanup(false);
    forceBtn.onclick = () => cleanup(true);

    modal.classList.remove("hidden");
  });
}

async function finishUnfinishedTeamsBeforePublish() {
  const response = await fetch(`/api/statistics/run/${runId}/finish-unfinished`, {
    method: "POST"
  });

  const result = await response.json();

  if (!response.ok) {
    throw new Error(result.error || "Помилка завершення незавершених команд");
  }

  return result;
}

function getPublicStatisticsUrlFromRun(run) {
  if (!run?.run_code) {
    return "";
  }

  return `${window.location.origin}/public-statistics.html?run=${encodeURIComponent(run.run_code)}`;
}

async function copyPublicStatisticsLink() {
  const copyMessage = document.getElementById("publicStatisticsCopyMessage");
  const publicLink = document.getElementById("publicStatisticsLink");
  const publicUrl = publicLink?.href || "";

  copyMessage.textContent = "";

  if (!publicUrl || publicUrl.endsWith("#")) {
    return;
  }

  try {
    await navigator.clipboard.writeText(publicUrl);
    copyMessage.textContent = "посилання скопійоване";

    setTimeout(() => {
      copyMessage.textContent = "";
    }, 3000);
  } catch (error) {
    copyMessage.textContent = "Не вдалося скопіювати";

    setTimeout(() => {
      copyMessage.textContent = "";
    }, 3000);
  }
}

function showPublishedStatisticsLink(publicUrl) {
  const publishButton = document.getElementById("publishStatisticsBtn");
  const message = document.getElementById("publishStatisticsMessage");
  const linkBlock = document.getElementById("publicLinkBlock");
  const publicLink = document.getElementById("publicStatisticsLink");

  message.className = "";
  message.textContent = "";

  if (publicUrl) {
    publicLink.href = publicUrl;
    publicLink.textContent = publicUrl;
    linkBlock.classList.remove("hidden");
  }

  publishButton.classList.add("hidden");
}

function showUnpublishedStatisticsControls() {
  const publishButton = document.getElementById("publishStatisticsBtn");
  const linkBlock = document.getElementById("publicLinkBlock");

  publishButton.classList.remove("hidden");
  linkBlock.classList.add("hidden");
}

function syncPublishControls() {
  if (currentRun?.status === "ARCHIVED") {
    showPublishedStatisticsLink(getPublicStatisticsUrlFromRun(currentRun));
    return;
  }

  showUnpublishedStatisticsControls();
}

async function publishStatistics() {
  if (!currentRun) {
    alert("Статистика ще не завантажена");
    return;
  }

  const message = document.getElementById("publishStatisticsMessage");
  message.className = "";
  message.textContent = "";

  const unfinishedTeams = getUnfinishedTeams();

  if (unfinishedTeams.length > 0) {
    const shouldFinish = await askFinishUnfinishedTeams(unfinishedTeams.length);

    if (!shouldFinish) {
      return;
    }

    try {
      await finishUnfinishedTeamsBeforePublish();
      await loadStatistics();
    } catch (error) {
      message.className = "";
      message.textContent = error.message || "Помилка завершення незавершених команд";
      return;
    }
  } else {
    const confirmed = confirm(
      `Завершити гру "${currentRun.title}" і опублікувати статистику?

Після цього запуск буде перенесено в архів, а публічна статистика стане доступною за посиланням.`
    );

    if (!confirmed) {
      return;
    }
  }

  const response = await fetch(`/api/runs/${runId}/publish`, {
    method: "POST"
  });

  const result = await response.json();

  if (!response.ok) {
    message.className = "";
    message.textContent = result.error || "Помилка публікації статистики";
    return;
  }

  showPublishedStatisticsLink(result.public_statistics_url || "");

  // Після публікації запуск стає архівним, тому одразу
  // перерендерюємо статистику в режимі перегляду без групових дій
  // і без чекбоксів біля команд.
  await loadStatistics();
}

function formatAnswerType(type) {
  if (type === "MAIN") return "Основний";
  if (type === "BONUS") return "Бонусний";
  if (type === "PENALTY") return "Штрафний";
  return type || "-";
}

function formatAdjustmentType(type) {
  if (type === "BONUS_CODE") return "Бонусний код";
  if (type === "PENALTY_CODE") return "Штрафний код";
  if (type === "AUTO_TRANSITION") return "Автоперехід";
  if (type === "MANUAL_BONUS") return "Ручний бонус";
  if (type === "MANUAL_PENALTY") return "Ручний штраф";
  return type || "-";
}

function formatAdjustmentValue(item) {
  const seconds = Math.abs(Number(item.seconds) || 0);

  if (
    item.adjustment_type === "BONUS_CODE" ||
    item.adjustment_type === "MANUAL_BONUS"
  ) {
    return `<span class="stat-bonus">-${formatDuration(seconds)}</span>`;
  }

  return `<span class="stat-penalty">+${formatDuration(seconds)}</span>`;
}

function renderTextContent(value) {
  return escapeHtml(value || "").replaceAll("\\n", "<br>");
}

function renderDetailsList(items, emptyText, renderItem) {
  if (!items || !items.length) {
    return `<p class="muted-text">${escapeHtml(emptyText)}</p>`;
  }

  return `
    <ul>
      ${items.map(renderItem).join("")}
    </ul>
  `;
}

function renderDetailsTable(items, emptyText, headers, renderRow) {
  if (!items || !items.length) {
    return `<p class="muted-text">${escapeHtml(emptyText)}</p>`;
  }

  return `
    <table class="codes-table">
      <thead>
        <tr>
          ${headers.map(header => `<th>${escapeHtml(header)}</th>`).join("")}
        </tr>
      </thead>
      <tbody>
        ${items.map(renderRow).join("")}
      </tbody>
    </table>
  `;
}

function getSelectedCellClass(team, task) {
  const isSelectedRow =
    Number(selectedCell.teamId) === Number(team.id);

  const isSelectedColumn =
    Number(selectedCell.taskId) === Number(task.id);

  const isSelectedCell =
    isSelectedRow && isSelectedColumn;

  const classes = [];

  if (isSelectedRow) {
    classes.push("selected-stat-row-cell");
  }

  if (isSelectedColumn) {
    classes.push("selected-stat-column-cell");
  }

  if (isSelectedCell) {
    classes.push("selected-stat-cell");
  }

  return classes.join(" ");
}


function getCheckedTeamIds() {
  return Array.from(
    document.querySelectorAll(".team-bulk-checkbox:checked")
  ).map(input => Number(input.value)).filter(Boolean);
}

function syncSelectedTeamsFromCheckboxes() {
  selectedTeamIds = new Set(getCheckedTeamIds());
  updateBulkActionsState();
}

function toggleAllTeams(checked) {
  document
    .querySelectorAll(".team-bulk-checkbox")
    .forEach(input => {
      input.checked = checked;
    });

  syncSelectedTeamsFromCheckboxes();
}

function updateBulkActionsState() {
  const selectedCount = selectedTeamIds.size;
  const selectedCountEl = document.getElementById("selectedTeamsCount");
  const moveBtn = document.getElementById("moveSelectedTeamsBtn");

  if (selectedCountEl) {
    selectedCountEl.textContent = `Обрано команд: ${selectedCount}`;
  }

  if (moveBtn) {
    moveBtn.disabled = selectedCount === 0;
  }
}

async function moveSelectedTeams() {
  const teamIds = getCheckedTeamIds();
  const targetValue = String(
    document.getElementById("bulkTargetTaskSelect")?.value || ""
  );
  const finishGame = targetValue === "FINISH";
  const targetTaskId = finishGame ? 0 : Number(targetValue) || 0;

  if (!teamIds.length) {
    alert("Оберіть хоча б одну команду");
    return;
  }

  if (!finishGame && !targetTaskId) {
    alert("Оберіть завдання або фініш");
    return;
  }

  const targetTask = currentTasks.find(
    task => Number(task.id) === Number(targetTaskId)
  );

  const confirmed = confirm(
    finishGame
      ? `Перевести обрані команди (${teamIds.length}) на фініш гри?`
      : `Перевести обрані команди (${teamIds.length}) на завдання №${targetTask?.sort_order || "?"}?`
  );

  if (!confirmed) {
    return;
  }

  const response = await fetch(
    `/api/statistics/run/${runId}/move-teams`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        teamIds,
        targetTaskId,
        finishGame
      })
    }
  );

  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Помилка групової дії");
    await loadStatistics();
    return;
  }

  const finishedCount = (result.results || [])
    .filter(item => item.status === "finished")
    .length;

  const movedCount = (result.results || [])
    .filter(item => item.status === "moved")
    .length;

  const skippedCount = (result.results || [])
    .filter(item => item.status === "skipped")
    .length;

  alert(
    finishGame
      ? `Групову дію виконано.
Переведено на фініш: ${finishedCount}
Пропущено: ${skippedCount}`
      : `Групову дію виконано.
Переведено: ${movedCount}
Пропущено: ${skippedCount}`
  );

  selectedTeamIds = new Set(teamIds);
  await loadStatistics();
}

function refreshStatisticsTableHighlight() {
  document
    .querySelectorAll(".statistics-table td, .statistics-table th")
    .forEach(cell => {
      cell.classList.remove(
        "selected-stat-row-cell",
        "selected-stat-column-cell",
        "selected-stat-cell"
      );
    });

  document
    .querySelectorAll(".statistics-table tbody tr")
    .forEach(row => {
      row.classList.remove("selected-stat-row");
    });

  if (!selectedCell.teamId) {
    return;
  }

  const selectedRowCell = document.querySelector(
    `[data-team-id="${selectedCell.teamId}"]`
  );

  if (selectedRowCell) {
    selectedRowCell
      .closest("tr")
      .classList.add("selected-stat-row");
  }

  if (selectedCell.specialColumn) {
    document
      .querySelectorAll(
        `[data-special-column="${selectedCell.specialColumn}"]`
      )
      .forEach(cell => {
        cell.classList.add("selected-stat-column-cell");
      });

    document
      .querySelectorAll(
        `[data-team-id="${selectedCell.teamId}"][data-special-column="${selectedCell.specialColumn}"]`
      )
      .forEach(cell => {
        cell.classList.add("selected-stat-cell");
      });
  }

  if (selectedCell.taskId) {
    document
      .querySelectorAll(`[data-task-id="${selectedCell.taskId}"]`)
      .forEach(cell => {
        cell.classList.add("selected-stat-column-cell");
      });

    document
      .querySelectorAll(
        `[data-team-id="${selectedCell.teamId}"][data-task-id="${selectedCell.taskId}"]`
      )
      .forEach(cell => {
        cell.classList.add("selected-stat-cell");
      });
  }
}

async function renderTaskDetails(teamId, taskId) {
  selectedCell = {
    teamId: Number(teamId),
    taskId: Number(taskId)
  };

  refreshStatisticsTableHighlight();

  const block = document.getElementById("detailsBlock");

  block.classList.remove("hidden");
  block.innerHTML = `
    <div class="info-block">
      Завантаження деталей завдання...
    </div>
  `;

  try {
    const response = await fetch(
  `/api/statistics/team/${teamId}/task/${taskId}?t=${Date.now()}`,
  {
    cache: "no-store"
  }
);
    const result = await response.json();

    if (!response.ok) {
      block.innerHTML = `
        <div class="info-block">
          ${escapeHtml(result.error || "Помилка завантаження деталей")}
        </div>
      `;
      return;
    }

    const task = result.task || {};
const content = result.content || [];
const hints = result.hints || [];
const answers = result.answers || [];
const foundAnswers = result.found_answers || [];
const answerLog = result.answer_log || [];
const adjustments = result.adjustments || [];

    block.innerHTML = `
      <div class="info-block">
        <h2>Деталі завдання</h2>

        <details>
          <summary>Контент завдання</summary>
          ${
            content.length
              ? content.map(item => `
                  <div class="details-content-item">
                    <strong>${escapeHtml(item.type || "TEXT")}:</strong><br>
                    ${renderTextContent(item.content)}
                  </div>
                `).join("")
              : `<p class="muted-text">Контент завдання не заповнений.</p>`
          }
        </details>

        <details>
          <summary>Підказки</summary>
          ${renderDetailsList(
            hints,
            "Підказки у цьому завданні не передбачені.",
            hint => `
              <li>
                <strong>Підказка №${escapeHtml(hint.sort_order)}:</strong>
                через ${escapeHtml(hint.show_after_seconds)} сек —
                ${renderTextContent(hint.content)}
              </li>
            `
          )}
        </details>

        <details>
          <summary>Всі коди завдання</summary>
          ${renderDetailsTable(
            answers,
            "Коди у цьому завданні не передбачені.",

          <summary>Лог введених відповідей</summary>

      </div>

    block.scrollIntoView({

    });

  } catch (error) {

  }
}

function formatScoreEventType(type) {
  const labels = {
    TASK_COMPLETE: "Завдання виконано",
    BONUS_CODE: "Бонусний код",
    PENALTY_CODE: "Штрафний код",
    HINT_PURCHASE: "Купівля підказки",
    OLYMPIAD_PURCHASE: "Купівля коду олімпійки",
    AUTO_TRANSITION: "Автоперехід",
    MANUAL_BONUS: "Ручний бонус",
    MANUAL_PENALTY: "Ручний штраф"
  };

  return labels[type] || type || "Подія";
}

function formatScoreValue(points) {
  const value = Number(points) || 0;
  const sign = value >= 0 ? "+" : "-";
  const css = value >= 0 ? "stat-bonus" : "stat-penalty";
  return `<span class="${css}">${sign}${Math.abs(value)} балів</span>`;
}


function renderScoreTaskLog(teamId, taskId) {
  selectedCell = { teamId: Number(teamId), taskId: Number(taskId) };
  refreshStatisticsTableHighlight();

  const team = currentTeams.find(item => Number(item.id) === Number(teamId));
  const task = currentTasks.find(item => Number(item.id) === Number(taskId));
  const block = document.getElementById("detailsBlock");
  block.classList.remove("hidden");

  if (!team || !task) {
    block.innerHTML = `<div class="info-block">Команду або завдання не знайдено</div>`;
    return;
  }

  const events = getScoreEventsForTask(team, taskId);
  const total = events.reduce((sum, event) => sum + (Number(event.points) || 0), 0);

  block.innerHTML = `
    <div class="info-block">
      <h2>Лог балів за завдання: ${escapeHtml(team.name)} — Завдання ${escapeHtml(task.sort_order || "")}</h2>
      ${renderDetailsTable(
        events,
        "На цьому завданні ще немає нарахувань або списань балів.",
        ["Тип", "Значення", "Коментар", "Час"],
        item => `
          <tr>
            <td>${escapeHtml(formatScoreEventType(item.event_type))}</td>
            <td>${formatScoreValue(item.points)}</td>
            <td>${escapeHtml(item.comment || "-")}</td>
            <td>${escapeHtml(QETime.formatLocalDateTime(item.created_at))}</td>
          </tr>
        `
      )}
      <p><strong>Разом за завдання:</strong> ${formatScoreValue(total)}</p>
    </div>
  `;

  block.scrollIntoView({ behavior: "smooth", block: "start" });
}

function showManualAdjustmentForm(
  teamId,
  adjustmentType
) {
  const block =
    document.getElementById(
      "manualAdjustmentForm"
    );

  const title =
    adjustmentType === "MANUAL_BONUS"
      ? "Додати бонус"
      : "Додати штраф";

  block.innerHTML = `
    <div class="info-block">

      <h3>${title}</h3>

      <label>
        Секунд

        <input
          id="adjustmentSeconds"
          type="number"
          min="1"
          value="60"
        >
      </label>

      <label>
        Коментар

        <input
          id="adjustmentComment"
          type="text"
        >
      </label>

      <button
        onclick="
          saveManualAdjustment(
            ${teamId},
            '${adjustmentType}'
          )
        "
      >
        Зберегти
      </button>

    </div>
  `;
}

async function saveManualAdjustment(
  teamId,
  adjustmentType
) {
  const seconds =
    Number(
      document.getElementById(
        "adjustmentSeconds"
      ).value
    ) || 0;

  const comment =
    document.getElementById(
      "adjustmentComment"
    ).value.trim();

  if (!seconds) {
    alert("Вкажіть секунди");
    return;
  }

  const team =
    currentTeams.find(
      item =>
        Number(item.id) === Number(teamId)
    );

  if (!team) {
    return;
  }

  const isBonus =
    adjustmentType === "MANUAL_BONUS";

  const endpoint =
    isBonus ? "bonus" : "penalty";

  const actionText =
    isBonus ? "бонус" : "штраф";

  const confirmed = confirm(
    `Ви призначаєте ${actionText} ${seconds} сек команді "${team.name}"?`
  );

  if (!confirmed) {
    return;
  }

  const response = await fetch(
    `/api/statistics/team/${teamId}/${endpoint}`,
    {
      method: "POST",
      headers: {
        "Content-Type":
          "application/json"
      },
      body: JSON.stringify({
        seconds,
        comment
      })
    }
  );

  const result =
    await response.json();

  if (!response.ok) {
    alert(
      result.error ||
      "Помилка збереження"
    );
    return;
  }

  await loadStatistics();

  renderTeamAdjustments(teamId);
}

async function deleteManualAdjustment(
  teamId,
  adjustmentId
) {
  const confirmed = confirm(
    "Видалити це коригування?"
  );

  if (!confirmed) {
    return;
  }

  const response = await fetch(
    `/api/statistics/team/${teamId}/adjustment/${adjustmentId}`,
    {
      method: "DELETE"
    }
  );

  const result =
    await response.json();

  if (!response.ok) {
    alert(
      result.error ||
      "Помилка видалення"
    );
    return;
  }

  await loadStatistics();

  renderTeamAdjustments(teamId);
}

async function forceFinishTask(teamId, taskId) {
  const confirmed = confirm(
    "Примусово завершити це завдання для команди?"
  );

  if (!confirmed) {
    return;
  }

  const response = await fetch(
    `/api/statistics/team/${teamId}/task/${taskId}/finish`,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({})
    }
  );

  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Помилка завершення завдання");
    await loadStatistics();
    return;
  }

  await loadStatistics();

  renderTaskDetails(teamId, taskId);
}

async function loadStatistics() {
  const response = await fetch(
  `/api/statistics/run/${runId}?t=${Date.now()}`,
  {
    cache: "no-store"
  }
);
  const result = await response.json();

  const block = document.getElementById("statisticsBlock");

  if (!response.ok) {
    block.textContent = result.error || "Помилка завантаження статистики";
    return;
  }

  currentRun = result.run || null;

  document
  .getElementById("publishStatisticsBlock")
  .classList.remove("hidden");

  if (currentRun) {
    updateTitle(currentRun);
    syncPublishControls();
  }

  const rawTeams = result.teams || [];
  const teams = prepareRanking(rawTeams);
  currentTeams = teams;

  const tasks = teams[0]?.tasks || [];
  currentTasks = tasks;

  if (!teams.length) {
    block.textContent = "Команд поки немає.";
    return;
  }

  const bulkActionsHtml = isRunArchived()
    ? ""
    : `
    <div class="bulk-actions-panel">
      <strong>Групові дії адміністратора</strong>

      <button type="button" onclick="toggleAllTeams(true)">
        Обрати всі
      </button>

        Зняти всі
      </button>

      <select id="bulkTargetTaskSelect">
        <option value="">Оберіть завдання або фініш</option>
        ${tasks.map(task => `
          <option value="${task.id}">
            ${String(task.title || "").trim() ? `Завдання ${task.sort_order}: ${escapeHtml(task.title)}` : `Завдання ${task.sort_order}`}
          </option>
        `).join("")}
        <option value="FINISH">Фініш</option>
      </select>

      <button
        type="button"
        id="moveSelectedTeamsBtn"
        onclick="moveSelectedTeams()"
        disabled
      >
        Перевести вибрані команди
      </button>

      <span id="selectedTeamsCount" class="muted-text">
        Обрано команд: 0
      </span>
    </div>
  `;

  if (isScoreMode()) {
    block.innerHTML = `
      ${bulkActionsHtml}
      <div class="statistics-table-wrapper">
        <table class="statistics-table">
          <thead>
            <tr>
              ${!isRunArchived() ? "<th>✓</th>" : ""}
              <th>Команда</th>
              <th>Час старту</th>
              ${tasks.map(task => `
                <th>
                  Завдання ${task.sort_order}<br>
                  <small>${escapeHtml(task.title || "")}</small>
                </th>
              `).join("")}
              <th>Час останнього<br>нарахування балів</th>
              <th>Ігровий час</th>
              <th data-special-column="score">Кількість<br>балів</th>
              <th>Відставання від<br>попередньої</th>
              <th>Відставання від<br>першої</th>
              <th>Місце</th>
            </tr>
          </thead>
          <tbody>
            ${teams.map(team => `
              <tr>
                ${!isRunArchived() ? `
                  <td>
                    <input
                      type="checkbox"
                      class="team-bulk-checkbox"
                      value="${team.id}"
                      ${selectedTeamIds.has(Number(team.id)) ? "checked" : ""}
                      onchange="syncSelectedTeamsFromCheckboxes()"
                      aria-label="Обрати команду ${escapeHtml(team.name)}"
                    >
                  </td>
                ` : ""}
                <td><strong>${escapeHtml(team.name)}</strong></td>
                <td class="time-stat-cell">${escapeHtml(QETime.formatLocalTime(team.started_at))}</td>
                ${tasks.map(task => {
                  const teamTask = (team.tasks || []).find(item => Number(item.id) === Number(task.id)) || task;
                  return `
                    <td
                      class="time-stat-cell clickable-stat-cell"
                      onclick="renderScoreTaskLog(${team.id}, ${task.id})"
                      data-team-id="${team.id}"
                      data-task-id="${task.id}"
                    >
                      ${formatScoreTaskCell(team, teamTask)}
                    </td>
                  `;
                }).join("")}
                <td>${escapeHtml(QETime.formatLocalTime(getTeamScoreReachedAt(team)))}</td>
                <td class="time-stat-cell">${getTeamScoreGameTimeSeconds(team) === null ? "-" : escapeHtml(formatDuration(getTeamScoreGameTimeSeconds(team)))}</td>
                <td
                  class="time-stat-cell clickable-stat-cell main-time-cell"
                  onclick="renderTeamScoreLog(${team.id})"
                  data-team-id="${team.id}"
                  data-special-column="score"
                  title="Показати лог нарахування балів"
                >${escapeHtml(String(getTeamScore(team)))} балів</td>
                <td>${team.gap_from_previous_score === null || team.gap_from_previous_score === undefined ? "-" : escapeHtml(String(team.gap_from_previous_score))}</td>

                <td class="place-cell">${team.place || "-"}</td>
              </tr>

          </tbody>
        </table>
      </div>
    `;
    updateBulkActionsState();
    return;
  }

  block.innerHTML = `
    ${bulkActionsHtml}

      <table class="statistics-table">

          <tr>
            ${!isRunArchived() ? "<th>✓</th>" : ""}

             <th data-task-id="${task.id}">
  Завдання ${task.sort_order}<br>
  <small>${escapeHtml(task.title)}</small>
</th>
            `).join("")}

            <th>Час фінішу</th>
            <th>Від старту<br>до фінішу</th>
            <th data-special-column="adjustments">Бонуси /<br>штрафи</th>

            <th>Місце</th>

        </thead>

        <tbody>
          ${teams.map(team => {
            const fullTime = getFullTimeSeconds(team);

            return `
              <tr>
                ${!isRunArchived() ? `
                <td>
                  <input

                    class="team-bulk-checkbox"
                    value="${team.id}"
                    ${selectedTeamIds.has(Number(team.id)) ? "checked" : ""}
                    onchange="syncSelectedTeamsFromCheckboxes()"
                    aria-label="Обрати команду ${escapeHtml(team.name)}"
                  >
                </td>
                ` : ""}

                <td>
                  <strong>${escapeHtml(team.name)}</strong>
                </td>

                <td class="time-stat-cell">
                  ${escapeHtml(QETime.formatLocalTime(team.started_at))}
                </td>

                ${team.tasks.map(task => `
                  <td
                    class="task-stat-cell clickable-stat-cell ${escapeHtml(task.cell.status)} ${getSelectedCellClass(team, task)}"

                <td class="time-stat-cell">

>
  ${formatBonusPenalty(team)}

                <td class="time-stat-cell main-time-cell">
                  ${escapeHtml(formatDuration(gameTime))}
                </td>

                <td class="time-stat-cell">
                  ${team.gap_from_previous_seconds === null

                    : escapeHtml(formatDuration(team.gap_from_previous_seconds))}
                </td>

                <td class="time-stat-cell">
                  ${team.gap_from_first_seconds === null
                    ? "-"
                    : escapeHtml(formatDuration(team.gap_from_first_seconds))}
                </td>

                <td class="place-cell">
                  ${team.place || "-"}
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;

  updateBulkActionsState();
}

document
  .getElementById("publishStatisticsBtn")
  .addEventListener("click", publishStatistics);

document
  .getElementById("copyPublicStatisticsLinkBtn")

loadStatistics();
