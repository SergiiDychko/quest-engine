<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Редагування завдання</title>
  <link rel="stylesheet" href="style.css" />
  <script src="content-renderer.js"></script>
  <script src="content-builder.js"></script>
</head>
<body>
<main class="app">
  <div class="card">
    <div class="task-settings-header">

  <div class="task-name-row">

    <label id="taskNumberLabel">
      Завдання
    </label>

    <input
      id="taskNameInput"
      type="text"
      class="task-name-input"
    >

    <button
      id="saveTaskNameBtn"
      class="icon-btn"
      title="Зберегти назву"
    >
      ✏️
    </button>

    <span id="saveTaskNameMessage"></span>

  </div>

  <div class="task-type-row">

    <label>Тип завдання:</label>

    <select id="taskTypeSelect">
      <option value="STANDARD">
        STANDARD — звичайне завдання
      </option>

      <option value="OLYMPIAD">
        OLYMPIAD — олімпійка
      </option>
    </select>

  </div>

  <div class="task-actions-row">

    <button
      id="deleteTaskBtn"
      class="danger-btn"
    >
      Видалити завдання
    </button>

  </div>

</div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="contentTab">Контент</button>
      <button class="tab-btn" data-tab="codesTab">Коди</button>
      <button class="tab-btn" data-tab="hintsTab">Підказки</button>
      <button class="tab-btn" data-tab="autoTab">Автоперехід</button>
    </div>

    <section id="contentTab" class="tab-panel">
      <h2>Конструктор контенту завдання</h2>
      <p class="muted-text">Додайте текст, зображення, відео, аудіо або власний HTML/CSS/JS. Порядок блоків можна змінювати кнопками ↑ та ↓.</p>
      <div id="contentBuilder">Завантаження...</div>
      <div class="save-row builder-preview-row">
        <button id="previewTaskContentBtn" type="button">Попередній перегляд</button>
      </div>
    </section>

    <section id="codesTab" class="tab-panel hidden">
      <h2>Коди завдання</h2>
      <div id="olympiadSettingsBlock"></div>
      <div id="codesList">Завантаження...</div>

      <div id="addCodesBlock">
        <hr />

        <h2>Додати коди</h2>
        <div class="add-codes-row">
          <input id="codesCount" type="number" value="1" min="1" />
          <select id="codesType">
            <option value="MAIN">Основні</option>
            <option value="BONUS">Бонусні</option>
            <option value="PENALTY">Штрафні</option>
          </select>
          <button id="addCodesBtn">Додати ще</button>
        </div>
      </div>
    </section>

    <section id="hintsTab" class="tab-panel hidden">
      <h2>Підказки</h2>
      <div id="hintsList">Завантаження...</div>
      <button onclick="addHint()">Додати підказку</button>
    </section>

    <section id="autoTab" class="tab-panel hidden">
      <h2>Автоперехід</h2>

      <div class="info-block auto-transition-block">
        <label class="auto-row">
          <input id="autoTransitionEnabled" type="checkbox" />
          <span>Увімкнути автоперехід</span>
        </label>

        <label class="auto-row">
          <span>Час до автопереходу (секунди)</span>
          <input id="autoTransitionMinutes" type="number" min="1" value="1800" />
        </label>

        <label class="auto-row">
          <span>Призначити штраф за автоперехід (секунди)</span>
          <input id="autoTransitionPenalty" type="number" min="0" value="0" />
        </label>

        <div class="auto-row">
          <button id="saveAutoTransitionBtn">Зберегти автоперехід</button>
        </div>
      </div>
    </section>

    <p id="message"></p>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const taskId = params.get("id");
const gameId = params.get("game");

let currentTask = null;
let currentAnswers = [];
let currentHints = [];
let currentOlympiad = null;

document.querySelectorAll(".tab-btn").forEach(button => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.add("hidden"));

    button.classList.add("active");
    document.getElementById(button.dataset.tab).classList.remove("hidden");
  });
});

function activateTab(tabId) {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tabId);
  });

  document.querySelectorAll(".tab-panel").forEach(panel => {
    panel.classList.toggle("hidden", panel.id !== tabId);
  });
}

function updateTaskEditorMode() {
  const type = document.getElementById("taskTypeSelect").value;
  const isOlympiad = type === "OLYMPIAD";

  const contentButton = document.querySelector('[data-tab="contentTab"]');
  const codesButton = document.querySelector('[data-tab="codesTab"]');
  const hintsButton = document.querySelector('[data-tab="hintsTab"]');

  if (contentButton) contentButton.classList.toggle("hidden", isOlympiad);
  if (hintsButton) hintsButton.classList.toggle("hidden", isOlympiad);
  if (codesButton) codesButton.textContent = isOlympiad ? "Олімпійка" : "Коди";

  if (isOlympiad) {
    activateTab("codesTab");
  } else if (document.querySelector('[data-tab="contentTab"]').classList.contains("hidden")) {
    activateTab("codesTab");
  }
}

async function loadTask() {
  const response = await fetch(`/api/tasks/${taskId}`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("taskTitle").textContent =
      result.error || "Помилка завантаження";
    return;
  }

  currentTask = result.task;
  currentAnswers = result.answers;

  document.getElementById("taskNumberLabel").textContent =
  `Завдання ${currentTask.sort_order}:`;

document.getElementById("taskNameInput").value =
  currentTask.title || "";

document.getElementById("taskTypeSelect").value =
  currentTask.task_type || "STANDARD";

  updateTaskEditorMode();

  await loadOlympiadIfNeeded();
  renderCodes(currentAnswers);
  renderAutoTransition();
}

async function saveTaskHeader(options = {}) {
  const title = document.getElementById("taskNameInput").value.trim();

  const response = await fetch(`/api/tasks/${taskId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      task_type: document.getElementById("taskTypeSelect").value
    })
  });

  const result = await response.json();
  const message = document.getElementById("saveTaskNameMessage");

  if (!response.ok) {
    if (!options.silent) {
      message.className = "";
      message.textContent = result.error;
    }
    return { ok: false, error: result.error || "Помилка збереження завдання" };
  }

  if (!options.silent) {
    message.className = "success-message";
    message.textContent = "✓ Назву збережено";

    setTimeout(() => {
      message.textContent = "";
    }, 3000);
  }

  if (!options.skipReload) {
    await loadTask();
  }

  return { ok: true };
}

document.getElementById("saveTaskNameBtn").addEventListener("click", async () => {
  await saveTaskHeader();
});

document
  .getElementById("taskTypeSelect")
  .addEventListener("change", async () => {

    const response =
      await fetch(`/api/tasks/${taskId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title:
            document.getElementById("taskNameInput").value.trim(),
          task_type:
            document.getElementById("taskTypeSelect").value,
          hide_answers_block:
            document.getElementById("taskTypeSelect").value === "OLYMPIAD"
        })
      });

    if (response.ok) {
      updateTaskEditorMode();
      loadTask();
    }

  });

  document
  .getElementById("deleteTaskBtn")
  .addEventListener("click", async () => {

    const confirmed =
      confirm(
        "Видалити це завдання?\n\nЦю дію неможливо скасувати."
      );

    if (!confirmed) {
      return;
    }

    const response =
      await fetch(`/api/tasks/${taskId}`, {
        method: "DELETE"
      });

    const result =
      await response.json();

    if (!response.ok) {
      alert(result.error);
      return;
    }

    window.parent.location.reload();
  });

let contentBuilder = null;

function normalizeContentBlock(item) {
  return {
    id: item.id,
    type: String(item.type || "TEXT").toUpperCase(),
    content: item.content || ""
  };
}

async function loadContent() {
  const response = await fetch(`/api/task-content/${taskId}`);
  const result = await response.json();
  const contentRoot = document.getElementById("contentBuilder");

  if (!response.ok) {
    contentRoot.textContent = result.error || "Помилка завантаження контенту";
    return;
  }

  const blocks = (result.content || []).map(normalizeContentBlock);

  contentBuilder = new QEContentBuilder({
    root: contentRoot,
    blocks,
    previewTitle: currentTask
      ? (String(currentTask.title || "").trim() ? `Завдання ${currentTask.sort_order}. ${currentTask.title}` : `Завдання ${currentTask.sort_order}.`)
      : "Попередній перегляд завдання"
  });
}

async function saveContentBlocksSilently() {
  if (!contentBuilder) {
    return { ok: true };
  }

  let blocks;
  try {
    blocks = contentBuilder.getBlocks();
  } catch (error) {
    return { ok: false, error: error.message || "Помилка перевірки секцій" };
  }

  const response = await fetch(`/api/task-content/${taskId}/bulk`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      blocks
    })
  });

  if (!response.ok) {
    const result = await response.json();
    return { ok: false, error: result.error || "Помилка збереження контенту" };
  }

  return { ok: true };
}

document.getElementById("previewTaskContentBtn").addEventListener("click", () => {
  if (!contentBuilder) return;

  const title = currentTask
    ? (String(currentTask.title || "").trim() ? `Завдання ${currentTask.sort_order}. ${currentTask.title}` : `Завдання ${currentTask.sort_order}.`)
    : "Попередній перегляд завдання";

  contentBuilder.openPreview(title);
});

async function loadHints() {
  const response = await fetch(`/api/task-hints/${taskId}`);
  const result = await response.json();

  const hintsList = document.getElementById("hintsList");

  if (!response.ok) {
    hintsList.textContent = result.error || "Помилка завантаження підказок";
    return;
  }

  currentHints = result.hints;

  if (!currentHints.length) {
    hintsList.textContent = "Підказок поки немає.";
    return;
  }

  hintsList.innerHTML = currentHints.map(hint => `
    <div class="info-block">
      <p><strong>Підказка №${hint.sort_order}</strong></p>

      <label>
        Через (секунд):
        <input
          type="number"
          id="hint-seconds-${hint.id}"
          value="${hint.show_after_seconds}"
        >
      </label>

      <textarea id="hint-content-${hint.id}" rows="4">${escapeHtml(hint.content || "")}</textarea>

      <button onclick="saveHint(${hint.id})">Зберегти підказку</button>
      <button onclick="deleteHint(${hint.id})">Видалити підказку</button>
    </div>
  `).join("");
}

async function addHint() {
  const response = await fetch(`/api/task-hints/${taskId}`, {
    method: "POST"
  });

  const result = await response.json();

  document.getElementById("message").textContent =
    response.ok ? "Підказку додано" : result.error;

  loadHints();
}

async function saveHint(hintId) {
  const show_after_seconds =
    document.getElementById(`hint-seconds-${hintId}`).value;

  const content =
    document.getElementById(`hint-content-${hintId}`).value;

  const response = await fetch(`/api/task-hints/${hintId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      show_after_seconds,
      content
    })
  });

  const result = await response.json();

  document.getElementById("message").textContent =
    response.ok ? "Підказку збережено" : result.error;

  loadHints();
}

async function deleteHint(hintId) {
  const confirmed = confirm("Видалити підказку?");
  if (!confirmed) return;

  const response = await fetch(`/api/task-hints/${hintId}`, {
    method: "DELETE"
  });

  const result = await response.json();

  document.getElementById("message").textContent =
    response.ok ? "Підказку видалено" : result.error;

  loadHints();
}

function renderAutoTransition() {
  const enabled =
    currentTask.auto_transition_minutes !== null &&
    currentTask.auto_transition_minutes !== undefined;

  document.getElementById("autoTransitionEnabled").checked = enabled;
  document.getElementById("autoTransitionMinutes").value =
    enabled ? currentTask.auto_transition_minutes : 30;
  document.getElementById("autoTransitionPenalty").value =
    currentTask.auto_transition_penalty_seconds || 0;
}


async function loadOlympiadIfNeeded() {
  currentOlympiad = null;

  if (!currentTask || currentTask.task_type !== "OLYMPIAD") {
    document.getElementById("olympiadSettingsBlock").innerHTML = "";
    return;
  }

  const response = await fetch(`/api/tasks/${taskId}/olympiad`);
  const result = await response.json();

  if (!response.ok) {
    document.getElementById("olympiadSettingsBlock").innerHTML = `
      <div class="info-block error-text">${escapeHtml(result.error || "Помилка завантаження олімпійки")}</div>
    `;
    return;
  }

  currentOlympiad = result;
  renderOlympiadEditor();
}

function calculateOlympiadTotalCells(x, l) {
  let total = 0;
  for (let level = 0; level < l; level++) {
    total += Math.pow(x, level);
  }
  return total;
}

let olympiadCellContentEditor = null;
let olympiadEditingCellNumber = null;

function parseOlympiadCellBlocks(value) {
  if (!value) return [];
  try {
    const parsed = JSON.parse(value);
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    return [{
      type: "SECTION",
      content: JSON.stringify({
        columns: [
          {
            width: 100,
            blocks: [
              {
                type: "TEXT",
                content: JSON.stringify({
                  text: String(value || ""),
                  html: `<p>${escapeHtml(String(value || ""))}</p>`,
                  format: "tiptap"
                })
              }
            ]
          }
        ]
      })
    }];
  }
}

function stringifyOlympiadCellBlocks(blocks) {
  return JSON.stringify(blocks || []);
}

function renderOlympiadCellPreview(content) {
  const blocks = parseOlympiadCellBlocks(content);
  if (!blocks.length) return `<span class="muted-text">Вміст не задано</span>`;
  return QEContentRenderer.renderBlocks(blocks);
}

function isBottomOlympiadCell(cell, settings) {
  return Number(cell.level_number) === Number(settings.level_count || 4);
}

function renderOlympiadEditor() {
  const root = document.getElementById("olympiadSettingsBlock");
  const settings = currentOlympiad.settings || {};
  const cells = currentOlympiad.cells || [];
  const total = cells.length || calculateOlympiadTotalCells(settings.association_count || 3, settings.level_count || 4);
  const completionType = settings.completion_type || "TOP_CELL";

  root.innerHTML = `
    <div class="info-block olympiad-editor-block olympiad-compact-editor">
      <h3>Налаштування олімпійки</h3>

      <div class="olympiad-settings-list">
        <label class="olympiad-setting-row">
          <span>Кількість асоціацій X</span>
          <input id="olympiadAssociationCount" type="number" min="2" max="6" value="${Number(settings.association_count) || 3}">
        </label>

        <label class="olympiad-setting-row">
          <span>Кількість рівнів L</span>
          <input id="olympiadLevelCount" type="number" min="2" max="6" value="${Number(settings.level_count) || 4}">
        </label>

        <label class="olympiad-setting-row olympiad-setting-row-wide">
          <span>Умова завершення</span>
          <select id="olympiadCompletionType">
            <option value="TOP_CELL" ${completionType === "TOP_CELL" ? "selected" : ""}>достатньо здати верхню клітинку</option>
            <option value="ALL" ${completionType === "ALL" ? "selected" : ""}>потрібно здати всі коди</option>
            <option value="COUNT" ${completionType === "COUNT" ? "selected" : ""}>потрібно здати N будь-яких кодів</option>
          </select>
        </label>

        <label id="olympiadRequiredCellsLabel" class="olympiad-setting-row">
          <span>N кодів для завершення</span>
          <input id="olympiadRequiredCellsCount" type="number" min="1" max="${total}" value="${settings.required_cells_count || total}">
        </label>

        <label class="olympiad-setting-row">
          <span>Можливість купівлі кодів через, сек</span>
          <input id="olympiadPurchaseAfterSeconds" type="number" min="0" value="${Number(settings.purchase_available_after_seconds) || 0}">
        </label>

        <label class="olympiad-setting-row olympiad-setting-checkbox-row">
          <span>Приховати блок «Відповіді» для гравців</span>
          <input id="hideAnswersBlockCheckbox" type="checkbox" ${currentTask.hide_answers_block ? "checked" : ""}>
        </label>
      </div>

      <div class="save-row">
        <button id="regenerateOlympiadBtn" type="button">Оновити структуру</button>
        <button id="saveOlympiadBtn" type="button">Зберегти олімпійку</button>
        <span id="saveOlympiadMessage"></span>
      </div>
    </div>

    <div class="info-block olympiad-cells-editor">
      <h3>Клітинки олімпійки: ${total}</h3>
      <p class="muted-text">Для клітинок найнижчого рівня доступний вміст клітинки. Для всіх рівнів вкажіть відповідь і ціну купівлі.</p>
      <div class="olympiad-cells-table-wrap">
        <table class="olympiad-cells-table olympiad-cells-v2-table">
          <thead>
            <tr>
              <th>№</th>
              <th>Рівень</th>
              <th>Питання / вміст клітинки</th>
              <th>Відповідь</th>
              <th>Купівля</th>
            </tr>
          </thead>
          <tbody>
            ${cells.map(cell => {
              const bottom = isBottomOlympiadCell(cell, settings);
              return `
                <tr data-olympiad-cell="${cell.cell_number}" data-cell-content="${escapeHtml(cell.content || "")}">
                  <td>${cell.cell_number}</td>
                  <td>${cell.level_number}</td>
                  <td class="olympiad-cell-editor-content-col">
                    ${bottom ? `
                      <div class="olympiad-editor-cell-preview" data-olympiad-content-preview="${cell.cell_number}">
                        ${renderOlympiadCellPreview(cell.content || "")}
                      </div>
                      <button type="button" class="olympiad-edit-content-btn" data-action="edit-olympiad-cell-content" data-cell-number="${cell.cell_number}">Редагувати вміст</button>
                    ` : `<span class="muted-text">—</span>`}
                  </td>
                  <td>
                    <input data-olympiad-field="answer_text" value="${escapeHtml(cell.answer_text || "")}" placeholder="Правильна відповідь">
                  </td>
                  <td>
                    <input data-olympiad-field="purchase_value" type="number" min="0" value="${Number(cell.purchase_value) || 0}" placeholder="0">
                  </td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      </div>
    </div>

    <div id="olympiadCellContentModal" class="modal-backdrop hidden">
      <div class="modal-card olympiad-content-modal-card">
        <div class="modal-header">
          <h3 id="olympiadCellContentModalTitle">Вміст клітинки</h3>
          <button type="button" class="small-light-btn" id="closeOlympiadCellContentModalBtn">×</button>
        </div>
        <div id="olympiadCellContentBuilder" class="olympiad-cell-content-builder"></div>
        <div class="save-row">
          <button type="button" id="saveOlympiadCellContentBtn">Застосувати вміст клітинки</button>
          <span id="olympiadCellContentMessage"></span>
        </div>
      </div>
    </div>
  `;

  document.getElementById("regenerateOlympiadBtn").addEventListener("click", regenerateOlympiadStructure);
  document.getElementById("saveOlympiadBtn").addEventListener("click", saveOlympiad);
  document.getElementById("olympiadCompletionType").addEventListener("change", updateOlympiadRequiredFieldState);
  document.getElementById("closeOlympiadCellContentModalBtn").addEventListener("click", closeOlympiadCellContentModal);
  document.getElementById("saveOlympiadCellContentBtn").addEventListener("click", applyOlympiadCellContent);

  root.querySelectorAll('[data-action="edit-olympiad-cell-content"]').forEach(button => {
    button.addEventListener("click", () => openOlympiadCellContentModal(Number(button.dataset.cellNumber)));
  });

  updateOlympiadRequiredFieldState();
  QEContentRenderer.resizeHtmlFrames(root);
}

function updateOlympiadRequiredFieldState() {
  const type = document.getElementById("olympiadCompletionType");
  const label = document.getElementById("olympiadRequiredCellsLabel");
  const input = document.getElementById("olympiadRequiredCellsCount");
  if (!type || !input || !label) return;
  const visible = type.value === "COUNT";
  label.classList.toggle("hidden", !visible);
  label.style.display = visible ? "" : "none";
  input.disabled = !visible;
}

async function openOlympiadCellContentModal(cellNumber) {
  olympiadEditingCellNumber = cellNumber;
  const row = document.querySelector(`[data-olympiad-cell="${cellNumber}"]`);
  const content = row?.dataset.cellContent || "";
  const modal = document.getElementById("olympiadCellContentModal");
  const root = document.getElementById("olympiadCellContentBuilder");

  document.getElementById("olympiadCellContentModalTitle").textContent = `Вміст клітинки №${cellNumber}`;
  modal.classList.remove("hidden");

  olympiadCellContentEditor = new QEContentBuilder({
    root,
    blocks: parseOlympiadCellBlocks(content),
    previewTitle: `Клітинка №${cellNumber}`
  });
}

function closeOlympiadCellContentModal() {
  const modal = document.getElementById("olympiadCellContentModal");
  modal.classList.add("hidden");
  olympiadEditingCellNumber = null;
  olympiadCellContentEditor = null;
}

function applyOlympiadCellContent() {
  if (!olympiadCellContentEditor || !olympiadEditingCellNumber) return;

  let blocks;
  try {
    blocks = olympiadCellContentEditor.getBlocks();
  } catch (error) {
    document.getElementById("olympiadCellContentMessage").textContent = error.message || "Помилка перевірки вмісту";
    return;
  }

  const serialized = stringifyOlympiadCellBlocks(blocks);
  const row = document.querySelector(`[data-olympiad-cell="${olympiadEditingCellNumber}"]`);
  if (row) {
    row.dataset.cellContent = serialized;
    const preview = row.querySelector(`[data-olympiad-content-preview="${olympiadEditingCellNumber}"]`);
    if (preview) {
      preview.innerHTML = renderOlympiadCellPreview(serialized);
      QEContentRenderer.resizeHtmlFrames(preview);
    }
  }

  closeOlympiadCellContentModal();
}

async function regenerateOlympiadStructure() {
  const x = Number(document.getElementById("olympiadAssociationCount").value) || 3;
  const l = Number(document.getElementById("olympiadLevelCount").value) || 4;
  const oldCells = new Map((currentOlympiad?.cells || []).map(cell => [Number(cell.cell_number), cell]));

  document.querySelectorAll("[data-olympiad-cell]").forEach(row => {
    const number = Number(row.dataset.olympiadCell);
    const old = oldCells.get(number) || {};
    old.content = row.dataset.cellContent || old.content || "";
    old.answer_text = row.querySelector('[data-olympiad-field="answer_text"]')?.value || old.answer_text || "";
    old.purchase_value = Number(row.querySelector('[data-olympiad-field="purchase_value"]')?.value) || old.purchase_value || 0;
    oldCells.set(number, old);
  });

  const meta = [];
  let cellNumber = 1;
  for (let level = l; level >= 1; level--) {
    const count = Math.pow(x, level - 1);
    for (let index = 0; index < count; index++) {
      const old = oldCells.get(cellNumber) || {};
      meta.push({
        cell_number: cellNumber,
        level_number: level,
        content: old.content || "",
        answer_text: old.answer_text || "",
        purchase_value: Number(old.purchase_value) || 0
      });
      cellNumber += 1;
    }
  }

  currentOlympiad = {
    settings: {
      association_count: x,
      level_count: l,
      completion_type: document.getElementById("olympiadCompletionType").value,
      required_cells_count: document.getElementById("olympiadRequiredCellsCount").value,
      purchase_available_after_seconds: document.getElementById("olympiadPurchaseAfterSeconds").value
    },
    cells: meta
  };

  renderOlympiadEditor();
}

function collectOlympiadPayload() {
  const rows = Array.from(document.querySelectorAll("[data-olympiad-cell]"));
  const cells = rows.map(row => ({
    cell_number: Number(row.dataset.olympiadCell),
    content: row.dataset.cellContent || "",
    answer_text: row.querySelector('[data-olympiad-field="answer_text"]').value,
    purchase_value: Number(row.querySelector('[data-olympiad-field="purchase_value"]').value) || 0,
    comment: ""
  }));

  return {
    association_count: Number(document.getElementById("olympiadAssociationCount").value) || 3,
    level_count: Number(document.getElementById("olympiadLevelCount").value) || 4,
    completion_type: document.getElementById("olympiadCompletionType").value,
    required_cells_count: Number(document.getElementById("olympiadRequiredCellsCount").value) || null,
    purchase_available_after_seconds: Number(document.getElementById("olympiadPurchaseAfterSeconds").value) || 0,
    hide_answers_block: document.getElementById("hideAnswersBlockCheckbox").checked,
    cells
  };
}


function normalizeCodeForDuplicateCheck(value) {
  return String(value || "")
    .trim()
    .replace(/\s+/g, " ")
    .toLowerCase();
}

function findDuplicateCodes(items) {
  const seen = new Map();

  for (const item of items) {
    const normalized = normalizeCodeForDuplicateCheck(item.value);
    if (!normalized) continue;

    if (seen.has(normalized)) {
      return {
        first: seen.get(normalized).label,
        second: item.label,
        value: item.value
      };
    }

    seen.set(normalized, item);
  }

  return null;
}

function formatDuplicateCodeMessage(duplicate) {
  return `Код ${duplicate.first} і код ${duplicate.second} однакові. Потрібно виправити.`;
}

function validateNoDuplicateCodes(items) {
  const duplicate = findDuplicateCodes(items);
  if (!duplicate) {
    return { ok: true };
  }

  const error = formatDuplicateCodeMessage(duplicate);
  alert(error);

  return {
    ok: false,
    error
  };
}

async function saveOlympiad(options = {}) {
  if (!currentTask || currentTask.task_type !== "OLYMPIAD") {
    return { ok: true };
  }

  const payload = collectOlympiadPayload();

  const duplicateValidation = validateNoDuplicateCodes(
    payload.cells.map(cell => ({
      label: String(cell.cell_number),
      value: cell.answer_text
    })),
    "saveOlympiadMessage"
  );

  if (!duplicateValidation.ok) {
    return duplicateValidation;
  }

  const response = await fetch(`/api/tasks/${taskId}/olympiad`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const result = await response.json();
  const message = document.getElementById("saveOlympiadMessage");

  if (!response.ok) {
    if (message && !options.silent) {
      message.className = "";
      message.textContent = result.error || "Помилка збереження олімпійки";
    }
    return { ok: false, error: result.error || "Помилка збереження олімпійки" };
  }

  if (message && !options.silent) {
    message.className = "success-message";
    message.textContent = "✓ Олімпійку збережено";
    setTimeout(() => { message.textContent = ""; }, 3000);
  }

  await loadOlympiadIfNeeded();
  return { ok: true };
}

function renderCodes(answers) {
  const list = document.getElementById("codesList");

  const addCodesBlock = document.getElementById("addCodesBlock");

  if (currentTask && currentTask.task_type === "OLYMPIAD") {
    if (addCodesBlock) addCodesBlock.classList.add("hidden");
    list.innerHTML = `<p class="muted-text">Основні коди олімпійки редагуються у таблиці клітинок вище.</p>`;
    return;
  }

  if (addCodesBlock) addCodesBlock.classList.remove("hidden");

  const mainAnswers = answers.filter(a => a.answer_type === "MAIN");
  const bonusAnswers = answers.filter(a => a.answer_type === "BONUS");
  const penaltyAnswers = answers.filter(a => a.answer_type === "PENALTY");

  const requiredBlock = mainAnswers.length > 1 ? `
    <div class="info-block">
      <h3>Умова проходження</h3>
      <p>Основних кодів: <strong>${mainAnswers.length}</strong></p>
      <label>
        Для виконання завдання потрібно здати:
        <input
          id="requiredMainAnswers"
          type="number"
          min="1"
          max="${mainAnswers.length}"
          value="${currentTask.required_main_answers || mainAnswers.length}"
        />
      </label>
    </div>
  ` : "";

  list.innerHTML = `
    ${requiredBlock}
    ${renderCodeTable("Основні коди", mainAnswers, false)}
    ${renderCodeTable("Бонусні коди", bonusAnswers, true)}
    ${renderCodeTable("Штрафні коди", penaltyAnswers, true)}
    ${answers.length ? `<button id="saveAllCodesBtn">Зберегти всі коди</button>` : "Кодів поки немає."}
  `;

  const saveBtn = document.getElementById("saveAllCodesBtn");
  if (saveBtn) saveBtn.addEventListener("click", saveAllCodes);
}

function renderCodeTable(title, answers, showSeconds) {
  if (!answers.length) return "";

  return `
    <div class="info-block">
      <h3>${title}</h3>

      <table class="codes-table">
        <thead>
          <tr>
            <th>№</th>
            <th>Значення <button class="help-btn" title="Тут введіть правильну відповідь">?</button></th>
            <th>Опис <button class="help-btn" title="Наприклад: одне слово, кирилиця">?</button></th>
            <th>Коментар <button class="help-btn" title="Зʼявиться після здачі коду">?</button></th>
            ${showSeconds ? `<th>Секунди <button class="help-btn" title="Для бонусів і штрафів вкажіть значення в секундах">?</button></th>` : ""}
            <th class="delete-column"></th>
          </tr>
        </thead>
        <tbody>
          ${answers.map(answer => `
            <tr>
              <td>${answer.sort_order}</td>
              <td><input data-id="${answer.id}" data-field="answer_text" value="${escapeHtml(answer.answer_text || "")}"></td>
              <td><input data-id="${answer.id}" data-field="description" value="${escapeHtml(answer.description || "")}"></td>
              <td><input data-id="${answer.id}" data-field="comment" value="${escapeHtml(answer.comment || "")}"></td>
              ${showSeconds ? `
                <td>
                  <input
                    data-id="${answer.id}"
                    data-field="time_modifier_seconds"
                    type="number"
                    value="${answer.time_modifier_seconds || 0}"
                  >
                </td>
              ` : ""}
              <td class="delete-column">
                <button class="delete-code-btn" onclick="deleteCode(${answer.id})">Видалити</button>
              </td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

async function saveAllCodes() {
  const answers = currentAnswers.map(answer => {
    const timeInput = document.querySelector(
      `[data-id="${answer.id}"][data-field="time_modifier_seconds"]`
    );

    return {
      id: answer.id,
      sort_order: answer.sort_order,
      answer_type: answer.answer_type,
      answer_text: document.querySelector(`[data-id="${answer.id}"][data-field="answer_text"]`).value,
      description: document.querySelector(`[data-id="${answer.id}"][data-field="description"]`).value,
      comment: document.querySelector(`[data-id="${answer.id}"][data-field="comment"]`).value,
      time_modifier_seconds: timeInput ? timeInput.value : 0
    };
  });

  const duplicateValidation = validateNoDuplicateCodes(
    answers.map(answer => ({
      label: String(answer.sort_order),
      value: answer.answer_text
    }))
  );

  if (!duplicateValidation.ok) {
    return duplicateValidation;
  }

  const requiredInput = document.getElementById("requiredMainAnswers");

  const response = await fetch(`/api/tasks/${taskId}/answers`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      required_main_answers: requiredInput ? requiredInput.value : 1,
      answers
    })
  });

  const result = await response.json();

  if (!response.ok) {
    alert(result.error || "Помилка збереження кодів");
    return;
  }

  document.getElementById("message").textContent =
    `Коди збережено о ${new Date().toLocaleTimeString()}`;

  loadTask();
}

async function deleteCode(answerId) {
  const confirmed = confirm("Видалити цей код?");
  if (!confirmed) return;

  const response = await fetch(`/api/tasks/${taskId}/answers/${answerId}`, {
    method: "DELETE"
  });

  const result = await response.json();

  document.getElementById("message").textContent =
    response.ok ? "Код видалено" : result.error;

  loadTask();
}

    headers: { "Content-Type": "application/json" },

window.saveTaskChangesFromParent = async function () {
  const steps = [
    () => saveTaskHeader({ silent: true, skipReload: true }),
    saveContentBlocksSilently,
    saveAllCodesSilently,
    saveAllHintsSilently,
    saveAutoTransitionSilently
  ];

  for (const step of steps) {
    const result = await step();

    if (!result.ok) {
      return result;
    }
  }

  await loadTask();
  await loadContent();
  await loadHints();

  return { ok: true };
};
